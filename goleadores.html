<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hoje na História — Goleadores SPFC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --spfc-red: #C8102E;
            --spfc-red-dark: #8B0A1E;
            --spfc-red-glow: rgba(200, 16, 46, 0.4);
            --gold: #D4AF37;
            --gold-light: #F4D03F;
            --gold-dark: #B8860B;
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --bg-card: rgba(26, 26, 26, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition-fast: 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-base: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --transition-slow: 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
            --shadow-gold: 0 0 40px rgba(212, 175, 55, 0.15);
            --shadow-red: 0 0 40px rgba(200, 16, 46, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loading-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            position: relative;
        }
        .loading-logo svg {
            width: 100%;
            height: 100%;
        }
        .loading-logo .shield-fill {
            fill: none;
            stroke: var(--spfc-red);
            stroke-width: 2;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: drawShield 1.5s ease forwards;
        }
        .loading-logo .shield-inner {
            fill: var(--spfc-red);
            opacity: 0;
            animation: fadeIn 0.5s ease 1.2s forwards;
        }
        @keyframes drawShield {
            to { stroke-dashoffset: 0; }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        .loading-bar {
            width: 200px;
            height: 2px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loading-bar::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, var(--spfc-red), var(--gold));
            border-radius: 2px;
            animation: loadingSlide 1.2s ease-in-out infinite;
        }
        @keyframes loadingSlide {
            0% { left: -40%; }
            100% { left: 100%; }
        }
        .loading-text {
            margin-top: 16px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* ===== HEADER ===== */
        .page-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(24px) saturate(1.2);
            -webkit-backdrop-filter: blur(24px) saturate(1.2);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-brand .shield-icon {
            width: 36px;
            height: 36px;
        }
        .header-brand .shield-icon svg {
            width: 100%;
            height: 100%;
        }
        .header-brand h1 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-brand span {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header-back {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
        }
        .header-back:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: rgba(255,255,255,0.06);
        }
        .header-back svg {
            width: 16px;
            height: 16px;
        }

        /* ===== HERO / TOP 3 ===== */
        .hero-section {
            position: relative;
            padding: 40px 0 60px;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200, 16, 46, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 100%, rgba(212, 175, 55, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        .hero-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }
        .hero-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
        }
        .hero-label::before {
            content: '';
            width: 24px;
            height: 1px;
            background: var(--gold);
        }
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 30%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            max-width: 500px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Podium */
        .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
            perspective: 1000px;
        }
        .podium-item {
            position: relative;
            flex-shrink: 0;
            transition: transform var(--transition-slow);
        }
        .podium-item:hover {
            transform: translateY(-8px);
        }
        .podium-item.first {
            order: 2;
            z-index: 3;
        }
        .podium-item.second {
            order: 1;
            z-index: 2;
        }
        .podium-item.third {
            order: 3;
            z-index: 2;
        }

        .podium-card {
            position: relative;
            border-radius: var(--radius-xl);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-base);
        }
        .podium-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 2px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.6;
            transition: opacity var(--transition-base);
        }
        .podium-item.first .podium-card::before {
            opacity: 1;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
        }
        .podium-item.second .podium-card::before {
            background: linear-gradient(135deg, #C0C0C0, #808080);
        }
        .podium-item.third .podium-card::before {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
        }
        .podium-card:hover::before {
            opacity: 1;
        }

        .podium-card-inner {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: calc(var(--radius-xl) - 2px);
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .podium-item.first .podium-card-inner {
            width: 220px;
            padding: 24px;
        }
        .podium-item.second .podium-card-inner,
        .podium-item.third .podium-card-inner {
            width: 170px;
            padding: 16px;
        }

        .podium-rank {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;
            box-shadow: var(--shadow-md);
            z-index: 10;
        }
        .podium-item.first .podium-rank {
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            color: #1a1a1a;
            width: 44px;
            height: 44px;
            font-size: 20px;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
        }
        .podium-item.second .podium-rank {
            background: linear-gradient(135deg, #E8E8E8, #A0A0A0);
            color: #333;
        }
        .podium-item.third .podium-rank {
            background: linear-gradient(135deg, #D4A574, #8B6914);
            color: #1a1a1a;
        }

        .podium-photo {
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
            overflow: hidden;
            margin-bottom: 16px;
            position: relative;
        }
        .podium-item.first .podium-photo {
            aspect-ratio: 3/4;
        }
        .podium-item.second .podium-photo,
        .podium-item.third .podium-photo {
            aspect-ratio: 1/1;
        }
        .podium-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }
        .podium-card:hover .podium-photo img {
            transform: scale(1.05);
        }
        .podium-photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 900;
            color: var(--text-muted);
            background: linear-gradient(135deg, var(--bg-tertiary), #1f1f1f);
        }
        .podium-item.first .podium-photo-placeholder {
            font-size: 64px;
        }

        .podium-name {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .podium-item.first .podium-name {
            font-size: 18px;
        }
        .podium-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .podium-goals {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .podium-item.first .podium-goals {
            font-size: 48px;
        }
        .podium-goals-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .podium-glow {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 60px;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.3;
            pointer-events: none;
            transition: opacity var(--transition-base);
        }
        .podium-item.first .podium-glow {
            background: var(--gold);
            opacity: 0.4;
        }
        .podium-item.second .podium-glow {
            background: #C0C0C0;
        }
        .podium-item.third .podium-glow {
            background: #CD7F32;
        }
        .podium-card:hover .podium-glow {
            opacity: 0.6;
        }

        /* ===== CATEGORY NAV ===== */
        .category-nav {
            position: sticky;
            top: 68px;
            z-index: 90;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
        }
        .category-nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .category-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-bottom: 4px;
        }
        .category-scroll::-webkit-scrollbar {
            display: none;
        }
        .category-btn {
            flex-shrink: 0;
            padding: 10px 20px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
            font-family: inherit;
        }
        .category-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }
        .category-btn.active {
            background: var(--spfc-red);
            border-color: var(--spfc-red);
            color: #fff;
            box-shadow: 0 4px 20px var(--spfc-red-glow);
        }

        /* ===== SECTIONS ===== */
        .section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .section-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(22px, 3vw, 32px);
            font-weight: 900;
            line-height: 1.2;
        }
        .section-title .accent {
            color: var(--gold);
        }
        .section-count {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ===== PLAYER CARDS GRID ===== */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }
        @media (min-width: 640px) {
            .players-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px;
            }
        }
        @media (min-width: 1024px) {
            .players-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }

        .player-card {
            position: relative;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-base);
            transform-style: preserve-3d;
        }
        .player-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--shadow-lg), 0 0 30px rgba(200, 16, 46, 0.1);
        }
        .player-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .player-card-photo {
            width: 100%;
            aspect-ratio: 3/4;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
        }
        .player-card-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-slow);
        }
        .player-card:hover .player-card-photo img {
            transform: scale(1.08);
        }
        .player-card-photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(10,10,10,0.9) 100%);
            opacity: 0;
            transition: opacity var(--transition-base);
            display: flex;
            align-items: flex-end;
            padding: 12px;
        }
        .player-card:hover .player-card-photo-overlay {
            opacity: 1;
        }
        .player-card-photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 900;
            color: var(--text-muted);
        }

        .player-card-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 100px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            font-size: 11px;
            font-weight: 700;
            color: var(--gold);
            border: 1px solid rgba(212,175,55,0.3);
        }
        .player-card-rank {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--spfc-red);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 2px 10px rgba(200,16,46,0.4);
        }

        .player-card-info {
            padding: 14px;
        }
        .player-card-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-card-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .player-card-stats {
            display: flex;
            gap: 12px;
        }
        .player-card-stat {
            display: flex;
            flex-direction: column;
        }
        .player-card-stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            line-height: 1;
            color: var(--text-primary);
        }
        .player-card-stat-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ===== PLAYER DETAIL MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-base);
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }
        .modal-sheet {
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform var(--transition-base);
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            border-radius: 2px;
            background: var(--border-hover);
            margin: 12px auto;
            flex-shrink: 0;
        }
        .modal-content {
            overflow-y: auto;
            padding: 0 24px 32px;
            flex: 1;
        }
        .modal-content::-webkit-scrollbar {
            width: 4px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: var(--border-hover);
            border-radius: 2px;
        }

        .modal-hero {
            display: flex;
            gap: 20px;
            margin-bottom: 28px;
            align-items: flex-start;
        }
        .modal-photo {
            width: 120px;
            height: 160px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
            border: 1px solid var(--border);
        }
        .modal-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal-photo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 900;
            color: var(--text-muted);
        }
        .modal-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 4px;
        }
        .modal-info .meta {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }
        .modal-big-stat {
            display: inline-flex;
            flex-direction: column;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(200,16,46,0.2), rgba(200,16,46,0.05));
            border: 1px solid rgba(200,16,46,0.3);
            border-radius: var(--radius-md);
        }
        .modal-big-stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            line-height: 1;
            color: var(--gold-light);
        }
        .modal-big-stat-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .modal-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }
        .modal-stat-box {
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            text-align: center;
            transition: all var(--transition-fast);
        }
        .modal-stat-box:hover {
            border-color: var(--border-hover);
            background: rgba(255,255,255,0.03);
        }
        .modal-stat-box-value {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 4px;
        }
        .modal-stat-box-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            z-index: 10;
        }
        .modal-close:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        .modal-close svg {
            width: 18px;
            height: 18px;
        }

        /* ===== TABLE SECTIONS ===== */
        .table-section {
            margin-bottom: 48px;
        }
        .table-container {
            overflow-x: auto;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: var(--bg-card);
        }
        .table-container::-webkit-scrollbar {
            height: 6px;
        }
        .table-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: var(--border-hover);
            border-radius: 3px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 600px;
        }
        .data-table thead th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .data-table thead th:first-child {
            border-radius: var(--radius-lg) 0 0 0;
        }
        .data-table thead th:last-child {
            border-radius: 0 var(--radius-lg) 0 0;
        }
        .data-table tbody tr {
            transition: background var(--transition-fast);
            border-bottom: 1px solid var(--border);
        }
        .data-table tbody tr:last-child {
            border-bottom: none;
        }
        .data-table tbody tr:hover {
            background: rgba(255,255,255,0.02);
        }
        .data-table tbody td {
            padding: 14px 16px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .data-table tbody td:first-child {
            font-weight: 600;
            color: var(--text-primary);
        }
        .data-table tbody td.number {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--text-primary);
        }
        .data-table tbody td.highlight {
            color: var(--gold-light);
            font-weight: 700;
        }
        .data-table tbody tr:nth-child(1) td:first-child::before {
            content: '🥇 ';
        }
        .data-table tbody tr:nth-child(2) td:first-child::before {
            content: '🥈 ';
        }
        .data-table tbody tr:nth-child(3) td:first-child::before {
            content: '🥉 ';
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-in {
            animation: fadeInUp 0.6s ease forwards;
        }
        .stagger-1 { animation-delay: 0.05s; opacity: 0; }
        .stagger-2 { animation-delay: 0.1s; opacity: 0; }
        .stagger-3 { animation-delay: 0.15s; opacity: 0; }
        .stagger-4 { animation-delay: 0.2s; opacity: 0; }
        .stagger-5 { animation-delay: 0.25s; opacity: 0; }

        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .count-up {
            animation: countUp 0.8s ease forwards;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .podium {
                gap: 10px;
            }
            .podium-item.first .podium-card-inner {
                width: 160px;
                padding: 16px;
            }
            .podium-item.second .podium-card-inner,
            .podium-item.third .podium-card-inner {
                width: 130px;
                padding: 12px;
            }
            .podium-item.first .podium-goals {
                font-size: 36px;
            }
            .podium-item.first .podium-name {
                font-size: 14px;
            }
            .modal-hero {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .modal-stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }
    </style>
</head>

// UTILS
// ============================================================
const slugify = (str) => str.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');

const getPlayerSlug = (nome) => {
    const cleanName = nome.split('(')[0].trim();
    return slugify(cleanName);
};

const getPlayerPhoto = (nome) => {
    const slug = getPlayerSlug(nome);
    return `${CONFIG.cloudinaryBase}${slug}.jpg`;
};

const getInitials = (nome) => {
    const clean = nome.split('(')[0].trim();
    const parts = clean.split(' ');
    if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
};

const getRandomColor = (seed) => {
    const colors = ['#1a1a2e', '#16213e', '#0f3460', '#533483', '#e94560', '#2d3436', '#636e72', '#b2bec3'];
    let hash = 0;
    for (let i = 0; i < seed.length; i++) hash = seed.charCodeAt(i) + ((hash << 5) - hash);
    return colors[Math.abs(hash) % colors.length];
};

const animateNumber = (el, target, duration = 1500) => {
    const start = performance.now();
    const startVal = 0;
    const isFloat = String(target).includes(',');
    const cleanTarget = parseFloat(String(target).replace(',', '.'));

    const step = (now) => {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = startVal + (cleanTarget - startVal) * eased;

        if (isFloat) {
            el.textContent = current.toFixed(2).replace('.', ',');
        } else {
            el.textContent = Math.round(current);
        }

        if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
};

// ============================================================
// RENDER: PODIUM (TOP 3)
// ============================================================
const renderPodium = (category) => {
    const podium = document.getElementById('podium');
    const heroSection = document.querySelector('.hero-section');
    const headers = category.cabecalhos || [];
    const isRanking = headers.includes('GM') || headers.includes('GOLS') || headers.includes('GOLS COMO GOLEIRO');
    // Mostra/oculta o bloco do pódio conforme o tipo de categoria
    if (heroSection) heroSection.style.display = isRanking ? '' : 'none';
    if (!isRanking) return;
    const top3 = category.linhas.slice(0, 3);

    const order = [1, 0, 2];

    podium.innerHTML = order.map((idx, i) => {
        const player = top3[idx];
        if (!player) return '';

        const rank = idx + 1;
        const rankClass = rank === 1 ? 'first' : rank === 2 ? 'second' : 'third';
        const photoUrl = getPlayerPhoto(player.NOME);
        const goals = player.GM || player['GOLS'] || player['GOLS COMO GOLEIRO'] || player['GOLS DE FALTA'] || '0';
        const metaMatch = player.NOME.match(/\(([^)]+)\)/);
        const meta = metaMatch ? metaMatch[1] : '';
        const name = player.NOME.split('(')[0].trim();

        return `
            <div class="podium-item ${rankClass} animate-in stagger-${i+1}">
                <div class="podium-card" onclick="openPlayerModal('${category.titulo}', ${idx})">
                    <div class="podium-rank">${rank}</div>
                    <div class="podium-card-inner">
                        <div class="podium-photo">
                            <img src="${photoUrl}" 
                                 alt="${name}" 
                                 loading="eager"
                                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                            <div class="podium-photo-placeholder" style="display:none; background: linear-gradient(135deg, ${getRandomColor(name)}22, ${getRandomColor(name)}44); color: ${getRandomColor(name)}">
                                ${getInitials(name)}
                            </div>
                        </div>
                        <div class="podium-name">${name}</div>
                        <div class="podium-meta">${meta}</div>
                        <div class="podium-goals" data-count="${goals}">0</div>
                        <div class="podium-goals-label">Gols</div>
                    </div>
                    <div class="podium-glow"></div>
                </div>
            </div>
        `;
    }).join('');

    setTimeout(() => {
        document.querySelectorAll('.podium-goals[data-count]').forEach(el => {
            animateNumber(el, el.dataset.count);
        });
    }, 300);
};

            .replace('MAIS GOLS MARCADOS', 'Gols')
            .replace('MAIS GOLS', 'Gols')
            .replace('CAMPEONATO BRASILEIRO', 'Brasileiro')
            .replace('CAMPEONATO PAULISTA', 'Paulista')
            .replace('COPA LIBERTADORES', 'Libertadores')
            .replace('SÉCULO XXI', 'Século XXI')
            .replace('JOGOS ELIMINATÓRIOS', 'Mata-Mata')
            .replace('EM UM ÚNICO JOGO', '1 Jogo')
            .replace('EM UMA TEMPORADA', '1 Temporada')
            .replace('EM UMA EDIÇÃO DE', 'Edição')
            .replace('A CADA TEMPORADA', 'Por Temporada')
            .replace('A CADA EDIÇÃO DE', 'Por Edição')
            .replace('MAIS VEZES SENDO O JOGADOR COM MAIS GOLS', 'Artilheiro')
            .replace('NOS PRIMEIROS', 'Primeiros')
            .replace('GOLS DA VITÓRIA', 'Gols Vitória')
            .replace('DESEMPATANDO UM JOGO', 'Desempate')
            .replace('DE ABERTURA DE PLACAR', 'Abertura')
            .replace('À FRENTE', 'À Frente')
            .replace('EM ESTREIA DE JOGADOR', 'Estreia')
            .replace('NOS PRIMEIROS 15 MINUTOS', '15min')
            .replace('NOS ACRÉSCIMOS DO 2º TEMPO', 'Acréscimos')
            .replace('NO PRIMEIRO TEMPO', '1º Tempo')
            .replace('NO SEGUNDO TEMPO', '2º Tempo')
            .replace('DE PÊNALTI', 'Pênalti')
            .replace('DE FALTA', 'Falta')
            .replace('GOLEIROS COM MAIS GOLS', 'Goleiros')
    }));

    nav.innerHTML = categories.map((cat, i) => `
        <button class="category-btn ${i === 0 ? 'active' : ''}" data-index="${i}" onclick="selectCategory(${i})">
            ${cat.short}
        </button>
    `).join('');
};

// ============================================================
// RENDER: MAIN CONTENT
// ============================================================
const renderMainContent = (categoryIndex) => {
    const main = document.getElementById('mainContent');
    const category = appData[categoryIndex];
    currentCategory = category;

    const headers = category.cabecalhos;
    const rows = category.linhas;

    const isRanking = headers.includes('GM') || headers.includes('GOLS') || headers.includes('GOLS COMO GOLEIRO');

    let html = '';

    html += `
        <section class="section animate-in">
            <div class="section-header">
                <h3 class="section-title">${category.titulo.replace('MAIS GOLS MARCADOS ', '').replace('MAIS GOLS ', '').replace('MAIS ', '')}</h3>
                <span class="section-count">${rows.length} jogadores</span>
            </div>
    `;

    if (isRanking && rows.length > 3) {
        const remaining = rows.slice(3);
        html += `<div class="players-grid">`;
        html += remaining.map((row, i) => {
            const name = row.NOME.split('(')[0].trim();
            const metaMatch = row.NOME.match(/\(([^)]+)\)/);
            const meta = metaMatch ? metaMatch[1] : '';
            const photoUrl = getPlayerPhoto(row.NOME);
            const goals = row.GM || row['GOLS'] || row['GOLS COMO GOLEIRO'] || row['GOLS DE FALTA'] || '0';
            const games = row.J || row['JOGOS'] || '';
            const rank = i + 4;

            return `
                <div class="player-card animate-in stagger-${((i) % 5) + 1}" onclick="openPlayerModal('${category.titulo}', ${i + 3})">
                    <div class="player-card-photo">
                        <img src="${photoUrl}" alt="${name}" loading="lazy" 
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="player-card-photo-placeholder" style="display:none">
                            ${getInitials(name)}
                        </div>
                        <div class="player-card-photo-overlay">
                            <span style="color: var(--gold); font-size: 12px; font-weight: 600;">Ver detalhes →</span>
                        </div>
                    </div>
                    <div class="player-card-rank">${rank}</div>
                    <div class="player-card-info">
                        <div class="player-card-name">${name}</div>
                        <div class="player-card-meta">${meta}</div>
                        <div class="player-card-stats">
                            <div class="player-card-stat">
                                <span class="player-card-stat-value">${goals}</span>
                                <span class="player-card-stat-label">Gols</span>
                            </div>
                            ${games ? `
                            <div class="player-card-stat">
                                <span class="player-card-stat-value">${games}</span>
                                <span class="player-card-stat-label">Jogos</span>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        html += `</div>`;
    } else {
        html += `
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            ${headers.map(h => `<th>${h}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map((row, i) => `
                            <tr onclick="openPlayerModal('${category.titulo}', ${i})" style="cursor:pointer">
                                ${headers.map((h, hi) => {
                                    const val = row[h] || '';
                                    const isNum = !isNaN(parseFloat(String(val).replace(',', '.'))) && val !== '';
                                    const isFirstCol = hi === 0;
                                    const isGoals = h === 'GM' || h === 'GOLS' || h.includes('GOLS');
                                    return `<td class="${isNum ? 'number' : ''} ${isGoals ? 'highlight' : ''}">${val}</td>`;
                                }).join('')}
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }

    html += `</section>`;
    main.innerHTML = html;
};

// ============================================================
// MODAL
// ============================================================
const openPlayerModal = (categoryTitle, rowIndex) => {
    const category = appData.find(c => c.titulo === categoryTitle);
    if (!category) return;

    const player = category.linhas[rowIndex];
    const modal = document.getElementById('playerModal');
    const content = document.getElementById('modalContent');

    const name = player.NOME.split('(')[0].trim();
    const metaMatch = player.NOME.match(/\(([^)]+)\)/);
    const meta = metaMatch ? metaMatch[1] : '';
    const photoUrl = getPlayerPhoto(player.NOME);

    const keys = Object.keys(player).filter(k => k !== 'NOME');

    let primaryStat = { label: 'Gols', value: '0' };
    if (player.GM) primaryStat = { label: 'Gols Marcados', value: player.GM };
    else if (player['GOLS']) primaryStat = { label: 'Gols', value: player['GOLS'] };
    else if (player['GOLS COMO GOLEIRO']) primaryStat = { label: 'Gols', value: player['GOLS COMO GOLEIRO'] };
    else if (player['GOLS DE FALTA']) primaryStat = { label: 'Gols de Falta', value: player['GOLS DE FALTA'] };
    else if (player['G']) primaryStat = { label: 'Gols', value: player['G'] };
    else if (player['VEZES']) primaryStat = { label: 'Vezes', value: player['VEZES'] };

    const gridStats = keys.slice(0, 6).map(k => ({
        label: k,
        value: player[k]
    }));

    content.innerHTML = `
        <div class="modal-hero">
            <div class="modal-photo">
                <img src="${photoUrl}" alt="${name}" 
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="modal-photo-placeholder" style="display:none">
                    ${getInitials(name)}
                </div>
            </div>
            <div class="modal-info">
                <h2>${name}</h2>
                <div class="meta">${meta} · ${category.titulo.replace('MAIS GOLS MARCADOS ', '').replace('MAIS GOLS ', '')}</div>
                <div class="modal-big-stat">
                    <span class="modal-big-stat-value">${primaryStat.value}</span>
                    <span class="modal-big-stat-label">${primaryStat.label}</span>
                </div>
            </div>
        </div>

        <div class="modal-stats-grid">
            ${gridStats.map(s => `
                <div class="modal-stat-box">
                    <div class="modal-stat-box-value">${s.value}</div>
                    <div class="modal-stat-box-label">${s.label}</div>
                </div>
            `).join('')}
        </div>

        <div style="padding: 16px; background: var(--bg-tertiary); border-radius: var(--radius-md); border: 1px solid var(--border);">
            <div style="font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;">
                Estatísticas Completas
            </div>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                ${keys.map(k => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border);">
                        <span style="font-size: 12px; color: var(--text-muted);">${k}</span>
                        <span style="font-size: 13px; font-weight: 600; color: var(--text-primary);">${player[k]}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `;

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
};

const closeModal = () => {
    document.getElementById('playerModal').classList.remove('active');
    document.body.style.overflow = '';
};

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('playerModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
});

// ============================================================
// CATEGORY SELECT
// ============================================================
const selectCategory = (index) => {
    document.querySelectorAll('.category-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
    });

    const activeBtn = document.querySelectorAll('.category-btn')[index];
    if (activeBtn) {
        activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    renderMainContent(index);

    renderPodium(appData[index]);
};

// ============================================================
// INIT
// ============================================================
const init = async () => {
    try {
        if (CONFIG.jsonUrl) {
            const response = await fetch(CONFIG.jsonUrl);
            if (!response.ok) throw new Error('Failed to load data');
            appData = await response.json();
        } else {
            // Use local embedded data for testing
            appData = LOCAL_DATA;
        }

        setTimeout(() => {
            document.getElementById('loadingScreen').classList.add('hidden');
        }, 800);

        renderCategoryNav();
        renderPodium(appData[0]);
        renderMainContent(0);

    } catch (error) {
        console.error('Error loading data:', error);
        document.querySelector('.loading-text').textContent = 'Erro ao carregar dados';
        document.querySelector('.loading-bar').style.background = '#C8102E';
    }
};

// Start
init();
</script>

</body>
</html>
