<head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, collection,
  query, orderBy, limit, getDocs, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAsjpwQwio7Y2SREpnrJf0DSb9fySkhlSY",
  authDomain: "spfc-hoje-da329.firebaseapp.com",
  projectId: "spfc-hoje-da329",
  storageBucket: "spfc-hoje-da329.firebasestorage.app",
  messagingSenderId: "116174859005",
  appId: "1:116174859005:web:b1e54b040aef23c9c16c94"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window.WFB = { auth, db, provider, onAuthStateChanged, signInWithPopup, signOut,
  doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs, serverTimestamp };

onAuthStateChanged(auth, user => {
  window.WFB.currentUser = user || null;
  window.dispatchEvent(new CustomEvent('wfb-auth', { detail: { user } }));
});

window.dispatchEvent(new Event('wfb-ready'));
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --red:#CC0000;
  --red-dim:rgba(204,0,0,.12);
  --red-border:rgba(204,0,0,.25);
  --gold:#C8A84B;
  --gold-dim:rgba(200,168,75,.12);
  --gold-border:rgba(200,168,75,.3);
  --amber:#f59e0b;
  --bg:#0d0d0d;
  --bg2:#151515;
  --bg3:#1c1c1c;
  --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.12);
  --txt:#F2EDE8;
  --txt2:#9A9087;
  --txt3:rgba(255,255,255,.25);
  --hit:#C8A84B;
  --near:#f59e0b;
  --miss:#CC0000;
  --font-title:'Bebas Neue',Impact,sans-serif;
  --font-ui:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --r:10px;
}

html,body{background:var(--bg);color:var(--txt);font-family:var(--font-ui);min-height:100vh;overflow-x:hidden}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  height:calc(52px + var(--safe-top));
  padding-top:var(--safe-top);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:16px;padding-right:16px;
  background:var(--bg);
  border-bottom:1px solid var(--line);
}
.tb-back{
  display:flex;align-items:center;gap:6px;
  font-family:var(--font-ui);font-size:12px;font-weight:500;
  color:var(--txt2);text-decoration:none;letter-spacing:.3px;
  padding:6px 10px;border-radius:8px;
  border:1px solid var(--line2);
  background:transparent;cursor:pointer;transition:.15s;
}
.tb-back:active{background:var(--bg3)}

.tb-logo{
  font-family:var(--font-title);font-size:22px;letter-spacing:3px;color:var(--txt);
}
.tb-logo em{color:var(--red);font-style:normal}

.tb-streak{
  display:flex;align-items:center;gap:5px;
  font-family:var(--font-mono);font-size:13px;font-weight:500;
  color:var(--amber);
  padding:5px 10px;border-radius:8px;
  border:1px solid rgba(245,158,11,.2);
  background:rgba(245,158,11,.06);
}
.tb-streak .lbl{font-size:9px;color:rgba(245,158,11,.5);letter-spacing:1px;text-transform:uppercase}

/* ── PAGE LAYOUT ── */
.page{
  max-width:520px;margin:0 auto;
  padding:20px 16px calc(32px + var(--safe-bot));
  display:flex;flex-direction:column;gap:20px;
}

/* ── HERO ── */
.hero{
  display:flex;align-items:center;gap:16px;
  padding:16px;
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:var(--r);
}

.silhouette{
  width:72px;height:72px;border-radius:50%;flex-shrink:0;
  background:var(--bg3);
  border:2px solid var(--red-border);
  display:flex;align-items:center;justify-content:center;
  font-size:30px;
  position:relative;overflow:hidden;
}
.silhouette img{width:100%;height:100%;object-fit:cover;object-position:top center;border-radius:50%}
.silhouette.revealed{border-color:var(--gold-border)}

/* anel de progresso SVG */
.silo-ring{position:absolute;inset:-2px;width:calc(100% + 4px);height:calc(100% + 4px)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:2}
.ring-fill{
  fill:none;stroke:var(--red);stroke-width:2;
  stroke-linecap:round;
  stroke-dasharray:226;
  stroke-dashoffset:226;
  transform:rotate(-90deg);transform-origin:center;
  transition:stroke-dashoffset .4s ease;
}

.hero-info{flex:1;min-width:0}
.hero-edition{
  font-family:var(--font-mono);font-size:10px;color:var(--txt3);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;
}
.hero-title{
  font-family:var(--font-title);font-size:28px;letter-spacing:1px;
  color:var(--txt);line-height:1;margin-bottom:2px;
}
.hero-subtitle{
  font-family:var(--font-title);font-size:22px;letter-spacing:1px;
  color:var(--red);line-height:1;
}
.hero-date{
  font-size:11px;color:var(--txt2);margin-top:6px;
  font-family:var(--font-mono);letter-spacing:.5px;
}

/* ── PISTAS ── */
.clues{display:flex;flex-direction:column;gap:6px}
.clue{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r);transition:.2s;
}
.clue.active{border-color:var(--red-border);background:var(--red-dim)}
.clue.locked{opacity:.5}
.clue-num{
  font-family:var(--font-mono);font-size:11px;color:var(--txt3);
  width:16px;flex-shrink:0;text-align:center;
}
.clue.active .clue-num{color:var(--red)}
.clue-body{flex:1;min-width:0}
.clue-label{font-size:10px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.clue.active .clue-label{color:rgba(204,0,0,.6)}
.clue-value{font-size:14px;font-weight:600;color:var(--txt)}
.clue-lock{font-size:12px;color:var(--txt3)}
.clue-hint{font-size:11px;color:var(--txt3)}

/* ── INPUT ── */
.input-block{display:flex;flex-direction:column;gap:6px}
.input-row{display:flex;gap:8px;position:relative}
.w-input{
  flex:1;
  padding:12px 14px;
  background:var(--bg2);
  border:1.5px solid var(--line2);
  border-radius:var(--r);
  font-family:var(--font-ui);font-size:14px;font-weight:500;
  color:var(--txt);outline:none;transition:.15s;
  -webkit-appearance:none;
}
.w-input:focus{border-color:rgba(204,0,0,.5);background:var(--red-dim)}
.w-input::placeholder{color:var(--txt3);font-weight:400}
.w-input:disabled{opacity:.4}

.guess-btn{
  padding:0 18px;
  background:var(--red);border:none;border-radius:var(--r);
  font-family:var(--font-title);font-size:16px;letter-spacing:2px;
  color:#fff;cursor:pointer;flex-shrink:0;transition:.12s;
}
.guess-btn:active{transform:scale(.96);background:#a80000}
.guess-btn:disabled{opacity:.35;cursor:not-allowed}

.input-error{font-size:11px;color:rgba(255,80,80,.8);min-height:14px;padding-left:2px}

/* Autocomplete */
.autocomplete{
  position:absolute;top:calc(100% + 4px);left:0;right:60px;
  background:var(--bg3);border:1px solid var(--line2);
  border-radius:var(--r);box-shadow:0 8px 24px rgba(0,0,0,.5);
  z-index:50;overflow:hidden;display:none;
}
.ac-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--txt);
  border-bottom:1px solid var(--line);transition:.1s;
}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:var(--bg2)}
.ac-pos{margin-left:auto;font-size:10px;color:var(--txt3);letter-spacing:.5px;flex-shrink:0}

/* ── GRADE ── */
.grid-block{}
.grid-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
.grid-label{
  font-size:10px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--txt3);
}
.tries-counter{
  font-family:var(--font-mono);font-size:11px;color:var(--txt3);
}

.grid-wrap{
  overflow-x:auto;scrollbar-width:none;
  border:1px solid var(--line);border-radius:var(--r);
  background:var(--bg2);
}
.grid-wrap::-webkit-scrollbar{display:none}

.grid-table{min-width:480px;width:100%;border-collapse:collapse}

.grid-col-hdr{
  display:grid;grid-template-columns:var(--gcols);
  border-bottom:1px solid var(--line2);
}
.gch{
  padding:8px 6px;
  font-family:var(--font-mono);font-size:8px;font-weight:500;
  letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;
  text-align:center;border-right:1px solid var(--line);
}
.gch:first-child{text-align:left;padding-left:12px}
.gch:last-child{border-right:none}

.grid-rows{display:flex;flex-direction:column}
.grid-row{
  display:grid;grid-template-columns:var(--gcols);
  border-bottom:1px solid var(--line);
  animation:rowIn .3s ease both;
}
.grid-row:last-child{border-bottom:none}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}

.gcell{
  padding:9px 6px;text-align:center;
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
}
.gcell:first-child{text-align:left;padding-left:12px;align-items:flex-start}
.gcell:last-child{border-right:none}

.gcell.hit{background:rgba(200,168,75,.1)}
.gcell.near{background:rgba(245,158,11,.08)}
.gcell.miss{background:rgba(204,0,0,.07)}

.gcell-icon{font-size:9px;line-height:1;font-weight:700}
.gcell.hit .gcell-icon{color:var(--gold)}
.gcell.near .gcell-icon{color:var(--amber)}
.gcell.miss .gcell-icon{color:rgba(204,0,0,.6)}
.gcell-val{
  font-family:var(--font-mono);font-size:9px;
  color:var(--txt3);line-height:1.2;text-align:center;
}
.gcell.hit .gcell-val{color:rgba(200,168,75,.85)}
.gcell.near .gcell-val{color:rgba(245,158,11,.85)}

.gcell-name{
  font-size:11px;font-weight:600;color:var(--txt2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
}
.gcell-emoji{font-size:12px;margin-right:3px}
.empty-row .gcell{opacity:.3}
.empty-row .gcell-val{font-size:9px;color:var(--txt3)}

.legend{
  display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;
}
.legend-item{
  display:flex;align-items:center;gap:5px;
  font-size:10px;color:var(--txt3);
}
.legend-dot{width:7px;height:7px;border-radius:2px}

/* ── RESULTADO ── */
.result-card{
  border-radius:var(--r);overflow:hidden;
  border:1px solid var(--line2);
  background:var(--bg2);
  padding:20px;
  animation:resultIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
.result-card.win{border-color:var(--gold-border)}
@keyframes resultIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.result-header{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.result-avatar{
  width:60px;height:60px;border-radius:50%;flex-shrink:0;
  background:var(--bg3);border:2px solid var(--red-border);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;overflow:hidden;
}
.result-card.win .result-avatar{border-color:var(--gold-border)}
.result-name{
  font-family:var(--font-title);font-size:clamp(26px,7vw,36px);
  letter-spacing:1px;color:var(--txt);line-height:1;
}
.result-pos{font-size:12px;color:var(--txt2);margin-top:3px;letter-spacing:.3px}
.result-period{font-family:var(--font-mono);font-size:10px;color:var(--txt3);margin-top:2px}

.result-stats{
  display:flex;gap:0;
  border:1px solid var(--line);border-radius:8px;
  overflow:hidden;margin-bottom:14px;
}
.rstat{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--line)}
.rstat:last-child{border-right:none}
.rstat-val{font-family:var(--font-title);font-size:20px;color:var(--txt);line-height:1}
.rstat-lbl{font-size:9px;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;margin-top:2px}

.result-desc{
  font-size:12px;color:var(--txt2);line-height:1.6;margin-bottom:14px;
  padding-left:10px;border-left:2px solid var(--red-border);
}
.result-card.win .result-desc{border-left-color:var(--gold-border)}

.outcome-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.outcome-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
}
.outcome-badge.win{background:var(--gold-dim);border:1px solid var(--gold-border);color:var(--gold)}
.outcome-badge.lose{background:var(--red-dim);border:1px solid var(--red-border);color:#ff6666}
.outcome-tries{font-size:11px;color:var(--txt3);letter-spacing:.3px}

.emoji-grid{
  font-family:var(--font-mono);font-size:11px;line-height:1.6;
  background:var(--bg3);border-radius:8px;padding:10px 12px;
  color:var(--txt3);letter-spacing:2px;white-space:pre;
  border:1px solid var(--line);margin-bottom:12px;
}

.share-btn{
  width:100%;padding:13px;border-radius:var(--r);
  background:var(--red);border:none;cursor:pointer;
  font-family:var(--font-title);font-size:16px;letter-spacing:2px;color:#fff;
  transition:.12s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.share-btn:active{transform:scale(.98)}
.share-btn.copied{background:#7a5500}

/* ── NEXT ── */
.next-card{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;
  background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);
}
.next-label{font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:3px}
.next-timer{font-family:var(--font-title);font-size:24px;color:var(--gold);letter-spacing:2px;line-height:1}
.next-sub{font-size:10px;color:var(--txt3);margin-top:2px}

/* ── RANKING ── */
.rank-section-title{
  font-size:10px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--txt3);
  margin-bottom:8px;
}
.rank-list{display:flex;flex-direction:column;gap:4px}
.rank-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--r);
  background:var(--bg2);border:1px solid var(--line);
}
.rank-item.my-rank{border-color:var(--red-border);background:var(--red-dim)}
.rank-pos{font-family:var(--font-mono);font-size:13px;color:var(--txt3);width:20px;text-align:center;flex-shrink:0}
.rank-pos.gold{color:#F0D483}
.rank-pos.silver{color:#ccc}
.rank-pos.bronze{color:#c8865a}
.rank-avatar{
  width:28px;height:28px;border-radius:50%;
  background:var(--bg3);border:1px solid var(--line2);
  overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.rank-avatar img{width:100%;height:100%;object-fit:cover}
.rank-name{flex:1;font-size:13px;font-weight:500;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-item.my-rank .rank-name{color:var(--txt)}
.rank-streak{font-family:var(--font-mono);font-size:13px;color:var(--red)}
.rank-tries{font-size:9px;color:var(--txt3);letter-spacing:.5px}

/* ── LOGIN PROMPT ── */
.login-card{
  padding:14px 16px;border-radius:var(--r);
  background:var(--bg2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.login-card p{font-size:12px;color:var(--txt2);line-height:1.5}
.login-card strong{color:var(--gold)}
.login-btn{
  padding:8px 14px;border-radius:8px;
  background:transparent;border:1px solid var(--gold-border);
  font-size:11px;font-weight:600;letter-spacing:1px;
  color:var(--gold);cursor:pointer;white-space:nowrap;transition:.15s;
}
.login-btn:active{background:var(--gold-dim)}

/* ── LOADING ── */
.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 20px;gap:12px;
}
.loading-spinner{
  width:28px;height:28px;
  border:2px solid var(--line2);border-top-color:var(--red);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:11px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(16px + var(--safe-bot));left:50%;
  transform:translateX(-50%) translateY(60px);
  z-index:200;
  background:var(--bg3);border:1px solid var(--line2);
  border-radius:10px;padding:11px 18px;
  min-width:180px;max-width:calc(100vw - 32px);
  box-shadow:0 8px 24px rgba(0,0,0,.6);
  transition:.25s cubic-bezier(.34,1.56,.64,1);
  opacity:0;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-title{font-size:13px;font-weight:600;color:var(--txt)}
.toast-body{font-size:11px;color:var(--txt2);margin-top:2px}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="index.html" class="tb-back">← Voltar</a>
  <div class="tb-logo">WON<em>D</em>LER</div>
  <div class="tb-streak" id="streakChip" style="display:none">
    🔥 <span id="streakNum">0</span>
    <span class="lbl">streak</span>
  </div>
  <!-- placeholder para alinhar quando streak hidden -->
  <div style="width:80px"></div>
</header>

<main>

  <!-- LOADING -->
  <div class="loading" id="loadingState">
    <div class="loading-spinner"></div>
    <div class="loading-text">Carregando</div>
  </div>

  <!-- GAME -->
  <div id="gameContent" style="display:none">
  <div class="page">

    <!-- HERO -->
    <div class="hero">
      <div class="silhouette" id="siloInner">
        <svg class="silo-ring" viewBox="0 0 76 76" id="siloRingSvg">
          <circle class="ring-bg" cx="38" cy="38" r="36"/>
          <circle class="ring-fill" id="ringFill" cx="38" cy="38" r="36"/>
        </svg>
        <img id="siloImg" src="https://res.cloudinary.com/dkjlv0hcs/image/upload/v1780349356/5ac9aa15-bbbd-47c7-a1f0-e929d04f5725_inc1ye.png" alt="?" style="width:100%;height:100%;object-fit:cover;border-radius:50%">
        <span id="siloEmoji" style="display:none"></span>
      </div>
      <div class="hero-info">
        <div class="hero-edition" id="heroEdition">ÉDIÇÃO #1</div>
        <div class="hero-title">QUEM É ESSE</div>
        <div class="hero-subtitle">ÍDOLO TRICOLOR?</div>
        <div class="hero-date" id="heroDate">1 DE JUNHO</div>
      </div>
    </div>

    <!-- PISTAS -->
    <div class="clues" id="cluesSection"></div>

    <!-- INPUT -->
    <div class="input-block" id="inputSection">
      <div class="input-row">
        <div style="flex:1;position:relative">
          <input
            class="w-input"
            id="wondlerInput"
            type="text"
            placeholder="Nome do jogador..."
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
          <div class="autocomplete" id="autocomplete"></div>
        </div>
        <button class="guess-btn" id="guessBtn" onclick="makeGuess()">TENTAR</button>
      </div>
      <div class="input-error" id="inputError"></div>
    </div>

    <!-- GRADE -->
    <div class="grid-block">
      <div class="grid-header">
        <div class="grid-label">Tentativas</div>
        <div class="tries-counter" id="triesCounter">0 / 6</div>
      </div>
      <div class="grid-wrap">
        <div id="gridColHdr" class="grid-col-hdr"></div>
        <div id="gridRows" class="grid-rows"></div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Correto</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Próximo</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Errado</div>
        <div class="legend-item" style="font-size:9px;color:var(--txt3)">⬆⬇ direção do valor</div>
      </div>
    </div>

    <!-- RESULTADO -->
    <section id="resultSection"></section>

    <!-- PRÓXIMO -->
    <div class="next-card" id="nextSection" style="display:none">
      <div style="font-size:22px">⏳</div>
      <div>
        <div class="next-label">Próximo desafio em</div>
        <div class="next-timer" id="nextTimer">00:00:00</div>
        <div class="next-sub">Um novo ídolo a cada dia</div>
      </div>
    </div>

    <!-- LOGIN -->
    <div class="login-card" id="loginPrompt" style="display:none">
      <p>Entre para salvar seu <strong>streak</strong> e aparecer no ranking.</p>
      <button class="login-btn" onclick="doLogin()">ENTRAR</button>
    </div>

    <!-- RANKING -->
    <div id="rankingSection" style="display:none">
      <div class="rank-section-title">Melhores Streaks</div>
      <div class="rank-list" id="rankList"></div>
    </div>

  </div>
  </div><!-- /gameContent -->

</main>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-body" id="toastBody"></div>
</div>

<script>
'use strict';

const COLS = [
  {k:'posicao', l:'Posição'},
  {k:'pais',    l:'País'},
  {k:'decada',  l:'Década'},
  {k:'jogos',   l:'Jogos'},
  {k:'gols',    l:'Gols'},
  {k:'titulos', l:'Títulos'},
];

let DB = [
  {nome:'Rogério Ceni',emoji:'🧤',posicao:'Goleiro',pais:'Brasil',decada:1990,jogos:1237,gols:131,titulos:16,selecao:true,revelado:true,idolo:true,periodo:'1990–2015',desc:'O maior ídolo da história do SPFC. Goleiro artilheiro. 1237 jogos, 131 gols, 16 títulos.'},
  {nome:'Müller',emoji:'⚽',posicao:'Atacante',pais:'Brasil',decada:1980,jogos:380,gols:196,titulos:10,selecao:true,revelado:true,idolo:true,periodo:'1982–1994',desc:'Maior artilheiro da história do São Paulo com 196 gols. Ídolo eterno.'},
  {nome:'Careca',emoji:'🎯',posicao:'Atacante',pais:'Brasil',decada:1980,jogos:274,gols:157,titulos:8,selecao:true,revelado:true,idolo:true,periodo:'1978–1988',desc:'Um dos maiores centroavantes da história do futebol brasileiro.'},
  {nome:'Raí',emoji:'🎖️',posicao:'Meia',pais:'Brasil',decada:1990,jogos:273,gols:82,titulos:6,selecao:true,revelado:false,idolo:true,periodo:'1991–2004',desc:'Capitão dos campeões mundiais e libertadores. Ídolo eterno do Morumbi.'},
  {nome:'Kaká',emoji:'⚡',posicao:'Meia',pais:'Brasil',decada:2000,jogos:195,gols:68,titulos:8,selecao:true,revelado:true,idolo:true,periodo:'1999–2003',desc:'Bola de Ouro 2007. Revelado pelo São Paulo.'},
  {nome:'Cafu',emoji:'🏃',posicao:'Lateral',pais:'Brasil',decada:1990,jogos:263,gols:14,titulos:5,selecao:true,revelado:true,idolo:true,periodo:'1989–1994',desc:'Melhor lateral-direito da história do futebol. Revelado pelo SPFC.'},
  {nome:'Lugano',emoji:'🛡️',posicao:'Zagueiro',pais:'Uruguai',decada:2000,jogos:280,gols:12,titulos:7,selecao:true,revelado:false,idolo:true,periodo:'2004–2014',desc:'Capitão e zagueiro ídolo. Um dos maiores líderes da história tricolor.'},
  {nome:'Luís Fabiano',emoji:'💥',posicao:'Atacante',pais:'Brasil',decada:2000,jogos:305,gols:175,titulos:4,selecao:true,revelado:false,idolo:true,periodo:'2006–2012',desc:'O Fabuloso. Um dos maiores artilheiros da história do São Paulo.'},
  {nome:'Calleri',emoji:'⚽',posicao:'Atacante',pais:'Argentina',decada:2020,jogos:148,gols:68,titulos:2,selecao:true,revelado:false,idolo:true,periodo:'2021–',desc:'Artilheiro argentino que se tornou ídolo no São Paulo.'},
  {nome:'Lucas Moura',emoji:'⚡',posicao:'Meia',pais:'Brasil',decada:2020,jogos:78,gols:14,titulos:1,selecao:true,revelado:true,idolo:true,periodo:'2023–',desc:'Revelado pelo São Paulo, voltou como herói após carreira na Europa.'},
];

let STATE = {
  secret:null,guesses:[],won:false,dicas:0,
  streak:0,bestStreak:0,todayKey:'',edition:0,lastWonKey:null,
};
let gameEnded = false;

function getTodayKey(){return new Date().toISOString().slice(0,10)}
function getDateLabel(){return new Date().toLocaleDateString('pt-BR',{day:'numeric',month:'long'}).toUpperCase()}

function saveState(){
  try{localStorage.setItem('spfc_wondler',JSON.stringify({
    todayKey:STATE.todayKey,guesses:STATE.guesses,won:STATE.won,dicas:STATE.dicas,
    streak:STATE.streak,bestStreak:STATE.bestStreak,
    lastWonKey:STATE.won?STATE.todayKey:STATE.lastWonKey,
  }));}catch(e){}
}

function loadSavedState(){
  try{
    const raw=localStorage.getItem('spfc_wondler');
    if(!raw)return false;
    const saved=JSON.parse(raw);
    const todayKey=getTodayKey();
    if(saved.todayKey===todayKey){
      STATE.guesses=saved.guesses||[];STATE.won=saved.won||false;
      STATE.dicas=saved.dicas||0;STATE.streak=saved.streak||0;
      STATE.bestStreak=saved.bestStreak||0;STATE.lastWonKey=saved.lastWonKey||null;
      return true;
    }else{
      STATE.streak=saved.streak||0;STATE.bestStreak=saved.bestStreak||0;STATE.lastWonKey=saved.lastWonKey||null;
      const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
      const yk=yesterday.toISOString().slice(0,10);
      if(saved.lastWonKey!==yk&&saved.lastWonKey!==todayKey)STATE.streak=0;
      return false;
    }
  }catch(e){return false;}
}

function colVal(k,val){if(k==='decada')return val+'s';return String(val)}

function compare(guess){
  const s=STATE.secret;
  return COLS.map(({k})=>{
    const gv=guess[k],sv=s[k];
    if(typeof sv==='number'){
      if(gv===sv)return{cls:'hit',val:colVal(k,gv)};
      const diff=gv-sv;
      const near=k==='decada'?Math.abs(diff)===10:Math.abs(diff)/sv<0.25;
      return{cls:near?'near':'miss',val:colVal(k,gv)+(diff>0?' ⬇':' ⬆')};
    }
    return{cls:gv===sv?'hit':'miss',val:colVal(k,gv)};
  });
}

async function init(){
  await loadDB();
  const todayKey=getTodayKey();
  STATE.todayKey=todayKey;
  const dayNum=Math.floor(Date.now()/86400000);
  STATE.edition=dayNum%DB.length;
  STATE.secret=DB[STATE.edition];
  loadSavedState();
  updateStreakChip();
  renderHero();
  renderClues();
  renderGrid();
  setupInput();
  if(STATE.won||STATE.guesses.length>=6){
    gameEnded=true;
    document.getElementById('inputSection').style.display='none';
    showResult();
    renderNextTimer();
    document.getElementById('nextSection').style.display='flex';
    loadRanking();
    document.getElementById('rankingSection').style.display='block';
  }else{
    checkLoginPrompt();
  }
  document.getElementById('loadingState').style.display='none';
  document.getElementById('gameContent').style.display='block';
}

async function loadDB(){
  try{
    const res=await fetch('/data/wordle.json?v='+Date.now(),{signal:AbortSignal.timeout(6000)});
    if(!res.ok)throw new Error('not found');
    const lista=await res.json();
    if(lista&&lista.length>0)DB=lista;
  }catch(e){console.warn('Usando DB local:',e.message);}
}

/* ── RING PROGRESS ── */
function setRingProgress(progress){
  const fill=document.getElementById('ringFill');
  if(!fill)return;
  const circ=2*Math.PI*36; // r=36
  fill.style.strokeDashoffset=circ-(progress*circ);
}

/* ── HERO ── */
function renderHero(){
  const s=STATE.secret;
  document.getElementById('heroEdition').textContent=`ÉDIÇÃO #${STATE.edition+1}`;
  document.getElementById('heroDate').textContent=getDateLabel();
  setRingProgress(STATE.guesses.length/6);
  if(STATE.won||STATE.guesses.length>=6) revealSilhouette();
}

function revealSilhouette(){
  const s=STATE.secret;
  const inner=document.getElementById('siloInner');
  const siloImg=document.getElementById('siloImg');
  const emoji=document.getElementById('siloEmoji');
  inner.classList.add('revealed');
  if(s.foto){
    siloImg.src=s.foto;
    siloImg.style.display='block';
    emoji.style.display='none';
  }else{
    siloImg.style.display='none';
    emoji.style.display='block';
    emoji.textContent=s.emoji;
  }
}

/* ── PISTAS ── */
function renderClues(){
  const s=STATE.secret;
  const dicas=[
    {label:'Posição em campo',value:s.posicao},
    {label:'Década principal · País',value:s.decada+'s · '+s.pais},
    {label:'Títulos pelo São Paulo',value:s.titulos+' título'+(s.titulos!==1?'s':'')+' pelo SPFC'},
  ];
  const unlock=[0,2,4];
  document.getElementById('cluesSection').innerHTML=dicas.map((d,i)=>{
    const active=STATE.dicas>i||i===0||gameEnded;
    return `
    <div class="clue ${active?'active':'locked'}">
      <div class="clue-num">${i+1}</div>
      <div class="clue-body">
        <div class="clue-label">${d.label}</div>
        <div class="clue-value">${active
          ?d.value
          :`<span class="clue-hint">🔒 após ${unlock[i]} tentativas</span>`
        }</div>
      </div>
      ${!active?'<div class="clue-lock">🔒</div>':''}
    </div>`;
  }).join('');
}

/* ── GRID ── */
function colWidth(){
  const m=window.innerWidth<=440;
  return `${m?'85px':'105px'} repeat(${COLS.length},minmax(${m?'42px':'50px'},1fr))`;
}

function renderGrid(){
  const gcols=colWidth();
  document.documentElement.style.setProperty('--gcols',gcols);
  const hdr=document.getElementById('gridColHdr');
  hdr.style.gridTemplateColumns=gcols;
  hdr.innerHTML=`<div class="gch" style="text-align:left;padding-left:12px">Jogador</div>`+
    COLS.map(c=>`<div class="gch">${c.l}</div>`).join('');
  const rows=document.getElementById('gridRows');
  const all=[...STATE.guesses];
  while(all.length<6)all.push(null);
  rows.innerHTML=all.map((g,i)=>{
    if(!g){
      const isCur=i===STATE.guesses.length&&!gameEnded;
      return `<div class="grid-row empty-row" style="grid-template-columns:${gcols}">
        <div class="gcell"><div class="gcell-name" style="font-size:10px;color:rgba(255,255,255,${isCur?.3:.12})">${isCur?'← sua vez':'—'}</div></div>
        ${COLS.map(()=>`<div class="gcell"><div class="gcell-val">·</div></div>`).join('')}
      </div>`;
    }
    return `<div class="grid-row" style="grid-template-columns:${gcols};animation-delay:${i*.05}s">
      <div class="gcell"><div class="gcell-name"><span class="gcell-emoji">${g.emoji}</span>${g.nome}</div></div>
      ${g.cells.map(c=>`
        <div class="gcell ${c.cls}">
          <div class="gcell-icon">${c.cls==='hit'?'✓':c.cls==='near'?'≈':'✗'}</div>
          <div class="gcell-val">${c.val}</div>
        </div>`).join('')}
    </div>`;
  }).join('');
  document.getElementById('triesCounter').textContent=`${STATE.guesses.length} / 6`;
  setRingProgress(STATE.guesses.length/6);
}

/* ── INPUT ── */
function setupInput(){
  const inp=document.getElementById('wondlerInput');
  const ac=document.getElementById('autocomplete');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')makeGuess()});
  inp.addEventListener('input',function(){
    const v=this.value.trim().toLowerCase();
    if(v.length<2){ac.style.display='none';return;}
    const m=DB.filter(j=>j.nome.toLowerCase().includes(v)).slice(0,6);
    if(!m.length){ac.style.display='none';return;}
    ac.style.display='block';
    ac.innerHTML=m.map(j=>`
      <div class="ac-item" onclick="selectSuggestion('${j.nome.replace(/'/g,"\\'")}')">
        <span>${j.emoji} ${j.nome}</span>
        <span class="ac-pos">${j.posicao}</span>
      </div>`).join('');
  });
  document.addEventListener('click',e=>{
    if(!e.target.closest('#wondlerInput')&&!e.target.closest('#autocomplete'))ac.style.display='none';
  });
}

function selectSuggestion(name){
  document.getElementById('wondlerInput').value=name;
  document.getElementById('autocomplete').style.display='none';
  makeGuess();
}

function makeGuess(){
  if(gameEnded)return;
  const raw=document.getElementById('wondlerInput').value.trim();
  const errEl=document.getElementById('inputError');
  document.getElementById('autocomplete').style.display='none';
  if(!raw){errEl.textContent='Digite o nome de um jogador.';return;}
  const jogador=DB.find(j=>j.nome.toLowerCase()===raw.toLowerCase());
  if(!jogador){errEl.textContent='⚠️ Jogador não encontrado. Escolha da lista.';return;}
  if(STATE.guesses.some(g=>g.nome===jogador.nome)){errEl.textContent='Você já tentou esse jogador.';return;}
  errEl.textContent='';
  document.getElementById('wondlerInput').value='';
  const cells=compare(jogador);
  STATE.guesses.push({...jogador,cells});
  if(STATE.guesses.length>=2&&STATE.dicas<1)STATE.dicas=1;
  if(STATE.guesses.length>=4&&STATE.dicas<2)STATE.dicas=2;
  const isWin=jogador.nome===STATE.secret.nome;
  if(isWin){STATE.won=true;STATE.streak++;STATE.bestStreak=Math.max(STATE.bestStreak,STATE.streak);}
  else if(STATE.guesses.length>=6)STATE.streak=0;
  renderGrid();renderClues();updateStreakChip();
  if(isWin||STATE.guesses.length>=6){
    gameEnded=true;saveState();saveToFirebase();endGame();
  }else{saveState();}
  if(navigator.vibrate)navigator.vibrate(isWin?[30,10,30,10,80]:[20]);
}

function endGame(){
  revealSilhouette();
  setTimeout(()=>{
    document.getElementById('inputSection').style.display='none';
    showResult();
    document.getElementById('nextSection').style.display='flex';
    renderNextTimer();
    loadRanking();
    document.getElementById('rankingSection').style.display='block';
  },500);
  const msg=STATE.won
    ?`Em ${STATE.guesses.length}/6 tentativas! 🔥 Streak: ${STATE.streak}`
    :`Era ${STATE.secret.nome} ${STATE.secret.emoji}`;
  toast(STATE.won?'🔴 ACERTOU!':'💔 Fim de jogo',msg);
}

function showResult(){
  const s=STATE.secret;
  const isWin=STATE.won;
  const EMJI={hit:'🟡',near:'🟠',miss:'🔴'};
  const emojiGrid=STATE.guesses.map(g=>g.cells.map(c=>EMJI[c.cls]).join('')).join('\n');
  const shareText=`🔴 WONDLER #${STATE.edition+1} ${isWin?STATE.guesses.length+'/6':'X/6'}\n${emojiGrid}\nspfc-hoje.vercel.app/wondler.html`;
  const avatarContent=s.foto
    ?`<img src="${s.foto}" alt="${s.nome}" style="width:100%;height:100%;object-fit:cover;object-position:top center;">`
    :s.emoji;
  const el=document.getElementById('resultSection');
  el.innerHTML=`
  <div class="result-card ${isWin?'win':''}">
    <div class="result-header">
      <div class="result-avatar" style="${s.foto?'font-size:0;padding:0;overflow:hidden':''}">${avatarContent}</div>
      <div>
        <div class="result-name">${s.nome}</div>
        <div class="result-pos">${s.posicao} · ${s.pais}</div>
        <div class="result-period">${s.periodo}</div>
      </div>
    </div>
    <div class="result-stats">
      <div class="rstat"><div class="rstat-val">${s.jogos}</div><div class="rstat-lbl">Jogos</div></div>
      <div class="rstat"><div class="rstat-val">${s.gols}</div><div class="rstat-lbl">Gols</div></div>
      <div class="rstat"><div class="rstat-val">${s.titulos}</div><div class="rstat-lbl">Títulos</div></div>
    </div>
    <div class="result-desc">${s.desc||''}</div>
    <div class="outcome-row">
      <span class="outcome-badge ${isWin?'win':'lose'}">${isWin?'✓ ACERTOU':'✗ ERROU'}</span>
      <span class="outcome-tries">${isWin?`${STATE.guesses.length} tentativa${STATE.guesses.length>1?'s':''} · 🔥 Streak ${STATE.streak}`:'Melhor sorte amanhã!'}</span>
    </div>
    <div class="emoji-grid">${emojiGrid}</div>
    <button class="share-btn" id="shareBtn" onclick="doShare()">↗ COMPARTILHAR</button>
  </div>`;
  window._shareText=shareText;
}

async function doShare(){
  const text=window._shareText||'';
  const btn=document.getElementById('shareBtn');
  try{
    if(navigator.share)await navigator.share({text});
    else{await navigator.clipboard.writeText(text);btn.textContent='✓ COPIADO!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='↗ COMPARTILHAR';btn.classList.remove('copied');},2500);}
  }catch(e){
    try{await navigator.clipboard.writeText(text);}catch(e2){}
    btn.textContent='✓ COPIADO!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='↗ COMPARTILHAR';btn.classList.remove('copied');},2500);
  }
}

function renderNextTimer(){
  function update(){
    const now=new Date(),next=new Date(now);
    next.setDate(next.getDate()+1);next.setHours(0,0,0,0);
    const diff=next-now;
    const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    const el=document.getElementById('nextTimer');
    if(el)el.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }
  update();setInterval(update,1000);
}

function updateStreakChip(){
  const el=document.getElementById('streakNum');
  if(el)el.textContent=STATE.streak;
  const chip=document.getElementById('streakChip');
  if(chip)chip.style.display=STATE.streak>0?'flex':'none';
}

async function saveToFirebase(){
  if(!window.WFB||!STATE.won)return;
  const user=window.WFB.currentUser;if(!user)return;
  const{db,doc,setDoc,getDoc,serverTimestamp}=window.WFB;
  const uid=user.uid,dateKey=STATE.todayKey;
  try{
    let oldBest=0;
    try{const snap=await getDoc(doc(db,'ranking_wordle',uid+'_best'));if(snap.exists())oldBest=snap.data().bestStreak||0;}catch(e){}
    const newBest=Math.max(oldBest,STATE.bestStreak);
    const payload={uid,name:user.displayName||'Torcedor',avatar:null,streak:STATE.streak,bestStreak:newBest,tries:STATE.guesses.length,edition:STATE.edition,dateKey,lastWonKey:dateKey,updatedAt:serverTimestamp()};
    await setDoc(doc(db,'ranking_wordle',uid+'_'+dateKey),payload).catch(()=>{});
    await setDoc(doc(db,'ranking_wordle',uid+'_best'),payload,{merge:true}).catch(()=>{});
    STATE.bestStreak=newBest;saveState();
  }catch(e){console.warn('Firebase save error:',e);}
}

async function loadRanking(){
  if(!window.WFB)return;
  const{db,collection,query,orderBy,limit,getDocs}=window.WFB;
  try{
    const q=query(collection(db,'ranking_wordle'),orderBy('bestStreak','desc'),limit(10));
    const snap=await getDocs(q);
    const user=window.WFB.currentUser;
    const rankList=document.getElementById('rankList');if(!rankList)return;
    const seen=new Set(),items=[];
    snap.forEach(d=>{const data=d.data();if(d.id.endsWith('_best')&&!seen.has(data.uid)){seen.add(data.uid);items.push(data);}});
    if(!items.length){rankList.innerHTML=`<div style="padding:16px;text-align:center;font-size:11px;color:var(--txt3);letter-spacing:1px">Seja o primeiro do ranking!</div>`;return;}
    const posClass=['gold','silver','bronze'];
    rankList.innerHTML=items.map((item,i)=>{
      const isMe=user&&item.uid===user.uid;
      const av=item.avatar?`<img src="${item.avatar}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`<span>👤</span>`;
      return `<div class="rank-item ${isMe?'my-rank':''}">
        <div class="rank-pos ${posClass[i]||''}">${i+1}</div>
        <div class="rank-avatar">${av}</div>
        <div class="rank-name">${item.name||'Torcedor'}</div>
        <div style="text-align:right;flex-shrink:0">
          <div class="rank-streak">🔥${item.bestStreak||0}</div>
          <div class="rank-tries">${item.tries?item.tries+' tent.':''}</div>
        </div>
      </div>`;
    }).join('');
    document.getElementById('rankingSection').style.display='block';
  }catch(e){console.warn('Ranking load error:',e);}
}

function checkLoginPrompt(){
  const user=window.WFB?.currentUser;
  const el=document.getElementById('loginPrompt');
  if(!user&&el)el.style.display='flex';
}

async function doLogin(){
  if(!window.WFB)return;
  const{auth,provider,signInWithPopup}=window.WFB;
  try{
    await signInWithPopup(auth,provider);
    const el=document.getElementById('loginPrompt');if(el)el.style.display='none';
    toast('✅ Conectado!','Seu streak será salvo automaticamente');
  }catch(e){toast('Erro ao conectar',e.message);}
}

let toastTimer=null;
function toast(title,body,dur=3500){
  document.getElementById('toastTitle').textContent=title;
  document.getElementById('toastBody').textContent=body;
  const t=document.getElementById('toast');
  t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),dur);
}

window.addEventListener('wfb-ready',()=>init());
window.addEventListener('wfb-auth',(e)=>{
  if(e.detail.user){
    const el=document.getElementById('loginPrompt');if(el)el.style.display='none';
    if(STATE.won||STATE.guesses.length>=6)loadRanking();
  }
});
setTimeout(()=>{
  if(document.getElementById('loadingState').style.display!=='none'){
    window.WFB=window.WFB||{};init();
  }
},3000);
</script>
