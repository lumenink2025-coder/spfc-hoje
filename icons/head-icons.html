<!-- ═══════════════════════════════════════════
     ÍCONES E PWA — colar dentro do <head>
     Caminhos RELATIVOS (sem /), funcionam no
     GitHub Pages com ou sem subpasta de repo
     ═══════════════════════════════════════════ -->

<!-- Favicon padrão -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

<!-- Apple / iOS — ícone na tela de início -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<!-- Android / Chrome PWA -->
<link rel="manifest" href="manifest.json">

<!-- Cor da barra de status (Android Chrome) -->
<meta name="theme-color" content="#CC0000">

<!-- Impede que o iOS adicione brilho/botão extra -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SPFC Hoje">
