<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Técnicos Campeões · SPFC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #C9A84C;
      --gold:       #C8102E;
      --gold-dim:   #8A1F1F;
      --gold-pale:  #E0A0A0;
      --black:      #0A0A0A;
      --ink:        #0D0D0D;
      --panel:      #141209;
      --panel-warm: #1A1610;
      --surface:    #201D14;
      --border:     #2A2518;
      --border-lt:  #3A3220;
      --muted:      #5A5240;
      --text:       #E0D8C8;
      --text-dim:   #8A8070;
      --white:      #FFFFFF;
      --success:    #3A7A3A;
      --danger:     #8A1A1A;

      --sidebar-w: 280px;
      --header-h:  58px;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      display: flex; flex-direction: column;
    }

    /* ══ TOP BAR ══ */
    .topbar {
      height: var(--header-h);
      background: var(--ink);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 50;
    }
    .topbar-shield { object-fit: contain;
      width: 30px; height: 34px; flex-shrink: 0;
    }
    .topbar-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .06em;
      color: var(--white);
      flex: 1;
    }
    .topbar-title span {
      color: var(--gold);
    }
    .topbar-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--gold-dim);
      border: 1px solid var(--border-lt);
      padding: 3px 10px;
    }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }

    .btn {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      border: none; cursor: pointer;
      padding: 8px 16px;
      transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border-lt);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-gold {
      background: var(--gold);
      color: var(--black);
    }
    .btn-gold:hover { background: #D9B85C; }
    .btn-danger {
      background: transparent;
      color: #C05050;
      border: 1px solid #3A1818;
    }
    .btn-danger:hover { background: #1A0808; }
    .btn-success {
      background: var(--success);
      color: var(--white);
    }
    .btn-success:hover { background: #2A6A2A; }

    /* ══ LAYOUT ══ */
    .workspace {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-head {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 8px;
    }
    .sidebar-search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color .15s;
    }
    .sidebar-search::placeholder { color: var(--muted); }
    .sidebar-search:focus { border-color: var(--gold-dim); }

    .sidebar-list { overflow-y: auto; flex: 1; }
    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-track { background: var(--panel); }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--border-lt); }

    .coach-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
      position: relative;
    }
    .coach-item:hover { background: var(--panel-warm); }
    .coach-item.active {
      background: var(--surface);
      border-left: 2px solid var(--gold);
    }
    .coach-item.active .ci-name { color: var(--gold); }
    .ci-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 900;
      color: var(--red);
      width: 24px; text-align: center; flex-shrink: 0;
    }
    .ci-info { flex: 1; min-width: 0; }
    .ci-name {
      font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ci-sub {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 1px;
    }
    .ci-arrow { color: var(--border-lt); flex-shrink: 0; }
    .ci-arrow svg { width: 12px; height: 12px; display: block; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted);
      line-height: 1.8;
    }
    .sidebar-stats strong { color: var(--gold-dim); }

    /* ══ EDITOR PANEL ══ */
    .editor {
      flex: 1; overflow-y: auto; background: var(--ink);
    }
    .editor::-webkit-scrollbar { width: 6px; }
    .editor::-webkit-scrollbar-track { background: var(--ink); }
    .editor::-webkit-scrollbar-thumb { background: var(--border-lt); }

    /* Empty state */
    .editor-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 16px; text-align: center;
      padding: 40px;
    }
    .editor-empty-icon { opacity: .12; }
    .editor-empty-icon svg { width: 80px; height: 80px; color: var(--gold); }
    .editor-empty h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted);
    }
    .editor-empty p { font-size: 13px; color: var(--muted); max-width: 280px; }

    /* Editor header */
    .editor-header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: flex-start; gap: 16px;
      position: sticky; top: 0; z-index: 10;
    }
    .editor-header-info { flex: 1; }
    .editor-coach-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px; font-weight: 900;
      text-transform: uppercase; letter-spacing: -.01em;
      color: var(--white); line-height: 1;
    }
    .editor-coach-meta {
      font-size: 12px; color: var(--muted); margin-top: 4px;
      display: flex; gap: 12px; align-items: center;
    }
    .editor-coach-meta span { display: flex; align-items: center; gap: 4px; }
    .meta-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--border-lt); display: inline-block;
    }
    .editor-header-actions { display: flex; gap: 8px; flex-shrink: 0; padding-top: 2px; }

    /* Editor body */
    .editor-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

    /* Field group */
    .field-group {
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .field-group-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .field-group-icon { color: var(--gold); flex-shrink: 0; }
    .field-group-icon svg { width: 15px; height: 15px; display: block; }
    .field-group-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase;
      color: var(--gold-pale);
    }
    .field-group-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-row { display: grid; gap: 14px; }
    .field-row.col2 { grid-template-columns: 1fr 1fr; }
    .field-row.col3 { grid-template-columns: 1fr 1fr 1fr; }

    label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--gold-dim);
      display: flex; align-items: center; gap: 6px;
    }
    label .req { color: var(--red); }

    input[type=text], input[type=url], input[type=number], textarea, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s;
      resize: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--gold-dim); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    select { cursor: pointer; }
    select option { background: var(--surface); }

    textarea.bio { height: 100px; line-height: 1.6; }
    textarea.titles-raw { height: 80px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    .field-hint {
      font-size: 11px; color: var(--muted); line-height: 1.4;
    }

    /* Photo upload area */
    .photo-upload {
      border: 1px dashed var(--border-lt);
      background: var(--surface);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .photo-upload:hover { border-color: var(--gold-dim); background: var(--panel-warm); }
    .photo-upload input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; padding: 0;
    }
    .photo-upload-icon { color: var(--gold-dim); margin-bottom: 8px; }
    .photo-upload-icon svg { width: 28px; height: 28px; }
    .photo-upload-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-dim);
    }
    .photo-upload-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .photo-preview-wrap {
      display: none;
      position: relative;
    }
    .photo-preview-wrap.has-photo { display: block; }
    .photo-preview {
      width: 100%; max-height: 200px;
      object-fit: cover; object-position: top center;
      display: block;
      filter: grayscale(20%);
    }
    .photo-remove {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,.7);
      border: 1px solid var(--border-lt);
      color: #C05050;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      padding: 4px 10px; cursor: pointer;
    }

    /* Trophy list editor */
    .trophy-list { display: flex; flex-direction: column; gap: 6px; }
    .trophy-entry {
      display: grid;
      grid-template-columns: 1fr 90px 36px;
      gap: 6px; align-items: center;
    }
    .trophy-entry input { font-size: 13px; }
    .btn-icon {
      width: 36px; height: 36px;
      background: transparent;
      border: 1px solid var(--border-lt);
      color: var(--muted);
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .btn-icon:hover { border-color: #3A1818; color: #C05050; background: #0D0505; }
    .btn-icon svg { width: 14px; height: 14px; }
    .btn-add-trophy {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--gold-dim);
      background: transparent; border: 1px dashed var(--border-lt);
      padding: 8px 14px; cursor: pointer; width: 100%;
      justify-content: center; transition: all .15s;
    }
    .btn-add-trophy:hover { border-color: var(--gold-dim); color: var(--gold); background: var(--panel-warm); }
    .btn-add-trophy svg { width: 13px; height: 13px; }

    /* Bio list */
    .bio-list { display: flex; flex-direction: column; gap: 8px; }
    .bio-entry { display: flex; gap: 8px; align-items: flex-start; }
    .bio-entry textarea { flex: 1; }
    .bio-para-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--gold-dim);
      padding: 10px 0 0 2px; flex-shrink: 0; width: 16px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: var(--panel);
      border: 1px solid var(--border-lt);
      border-left: 3px solid var(--gold);
      padding: 12px 20px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: var(--text);
      display: flex; align-items: center; gap: 10px;
      transform: translateY(20px); opacity: 0;
      transition: all .3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-left-color: var(--red); }
    .toast svg { width: 16px; height: 16px; color: var(--gold); flex-shrink: 0; }
    .toast.error svg { color: var(--red); }

    /* JSON preview */
    .json-preview {
      background: var(--black);
      border: 1px solid var(--border);
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: #6A8F5A;
      line-height: 1.7;
      max-height: 200px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }

    /* Divider */
    .divider {
      height: 1px; background: var(--border);
      margin: 4px 0;
    }

    /* Tab strip inside editor */
    .editor-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      padding: 0 24px;
    }
    .editor-tab {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted);
      padding: 10px 16px;
      cursor: pointer; border: none; background: none;
      border-bottom: 2px solid transparent;
      transition: color .15s;
      margin-bottom: -1px;
    }
    .editor-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .editor-tab:hover:not(.active) { color: var(--text); }

    .editor-section { display: none; }
    .editor-section.active { display: flex; flex-direction: column; gap: 20px; }

    /* Unsaved indicator */
    .unsaved-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); display: none;
      flex-shrink: 0;
    }
    .unsaved-dot.visible { display: block; }

    /* Scrollbar global */
    * { scrollbar-width: thin; scrollbar-color: var(--border-lt) transparent; }

    .btn-back-admin {
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.6); text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      border-radius: 6px; padding: 6px 10px; flex-shrink: 0; transition: all .15s;
    }
    .btn-back-admin:hover { background: rgba(255,255,255,.1); color: rgba(255,255,255,.9); }
  </style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<header class="topbar">
  <a href="main.html" class="btn-back-admin">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Início
  </a>
  <img src="https://res.cloudinary.com/dkjlv0hcs/image/upload/v1780443967/393e3b8f-8e91-47f1-8476-65c51f103210_sdu0er.png" class="topbar-shield" alt="SPFC"/>
  <div class="topbar-title">SPFC · <span>Técnicos Campeões</span></div>
  <div class="topbar-badge">Painel Admin</div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" onclick="exportJSON()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Exportar JSON
    </button>
    <button class="btn btn-gold" onclick="saveAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
      </svg>
      Salvar Tudo
    </button>
  </div>
</header>

<!-- ══ WORKSPACE ══ -->
<div class="workspace">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-label">Técnicos Campeões</div>
      <input class="sidebar-search" type="text" placeholder="Buscar técnico…" id="searchInput" oninput="filterCoaches(this.value)"/>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="sidebar-footer">
      <div class="sidebar-stats" id="sidebarStats"></div>
      <button class="btn btn-gold" style="width:100%;margin-top:10px;justify-content:center;" onclick="addCoach()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Técnico
      </button>
    </div>
  </aside>

  <!-- EDITOR -->
  <main class="editor" id="editor">
    <div class="editor-empty" id="editorEmpty">
      <div class="editor-empty-icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 3H5v3H3v4a4 4 0 004 4v.17A3 3 0 005 17v1h14v-1a3 3 0 00-2-2.83V14a4 4 0 004-4V6h-2V3h-2v3H7V3zM7 10V8h10v2a2 2 0 01-2 2H9a2 2 0 01-2-2z"/>
        </svg>
      </div>
      <h2>Selecione um técnico</h2>
      <p>Escolha um técnico na lista à esquerda para editar seu perfil, foto, títulos e biografia.</p>
    </div>
    <div id="editorContent" style="display:none">
      <!-- injected by JS -->
    </div>
  </main>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  <span id="toastMsg">Salvo com sucesso</span>
</div>

<script>
/* ════════════════════════════════════════
   DATA — fetch do JSON (produção)
   Para a demo, os dados são embutidos abaixo.
   Na versão final, substitua pelo fetch.

/* ════ STATE ════ */
let COACHES = [];   // working copy
let AGE_MAP = {};   // col_0 -> first age row
let EXTRA = {};     // col_0 -> { foto, fotoBg, bios, anos, nasc }
let currentIdx = null;
let unsaved = false;

/* ════ INIT ════ */
async function init() {
  let raw;
  try {
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error();
    raw = await res.json();
    showToast('JSON carregado via fetch', false);
  } catch {
    raw = RAW_EMBEDDED;
    showToast('Modo demo — dados embutidos', false);
  }

  const t1 = raw.find(t => t.tabela === 1);
  const t2 = raw.find(t => t.tabela === 2);
  COACHES = t1.linhas.filter(r => r.col_0 !== 'TÉCNICO').map(c => ({...c}));

  // Build age map (first entry per coach = youngest conquest)
  const seenAge = new Set();
  t2.linhas.filter(r => r.col_0 !== 'TÉCNICO').forEach(r => {
    if (!seenAge.has(r.col_0)) { seenAge.add(r.col_0); AGE_MAP[r.col_0] = {...r}; }
  });

  // Init EXTRA from localStorage
  COACHES.forEach(c => {
    const stored = localStorage.getItem('extra_' + c.col_0);
    EXTRA[c.col_0] = stored ? JSON.parse(stored) : {
      foto: '', fotoBg: '', bios: [''], anos: '', nasc: ''
    };
  });

  renderSidebar(COACHES);
  updateStats();
}

/* ════ SIDEBAR ════ */
function renderSidebar(list) {
  const el = document.getElementById('sidebarList');
  el.innerHTML = '';
  list.forEach((c, i) => {
    const realIdx = COACHES.indexOf(c);
    const div = document.createElement('div');
    div.className = 'coach-item' + (realIdx === currentIdx ? ' active' : '');
    div.dataset.idx = realIdx;
    div.onclick = () => openCoach(realIdx);
    div.innerHTML = `
      <span class="ci-num">${c.col_1}</span>
      <div class="ci-info">
        <div class="ci-name">${c.col_0}</div>
        <div class="ci-sub">${firstTitle(c.col_2)}</div>
      </div>
      <span class="ci-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>`;
    el.appendChild(div);
  });
}

function filterCoaches(q) {
  const filtered = COACHES.filter(c => c.col_0.toLowerCase().includes(q.toLowerCase()));
  renderSidebar(filtered);
}

function firstTitle(rel) {
  return rel.split(',')[0].trim();
}

function updateStats() {
  const total = COACHES.reduce((s,c) => s + parseInt(c.col_1), 0);
  document.getElementById('sidebarStats').innerHTML =
    `<strong>${COACHES.length}</strong> técnicos · <strong>${total}</strong> títulos`;
}

/* ════ EDITOR ════ */
function openCoach(idx) {
  currentIdx = idx;
  const c = COACHES[idx];
  const ex = EXTRA[c.col_0];
  const age = AGE_MAP[c.col_0] || {};

  // update sidebar active
  document.querySelectorAll('.coach-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });

  document.getElementById('editorEmpty').style.display = 'none';
  const content = document.getElementById('editorContent');
  content.style.display = 'block';

  const titles = parseTitles(c.col_2);
  const bios = ex.bios && ex.bios.length ? ex.bios : [''];

  content.innerHTML = `
    <!-- EDITOR HEADER -->
    <div class="editor-header">
      <div class="editor-header-info">

/* ════ HELPERS ════ */
function parseTitles(rel) {
  return rel.split(',').map(s => {
    s = s.trim();
    const parts = s.split(/\s*[–-]\s*/);
    if (parts.length >= 2) return { name: parts.slice(0,-1).join(' – ').trim(), year: parts[parts.length-1].trim() };
    return { name: s, year: '' };
  }).filter(t => t.name);
}

function trophyEntryHTML(name, year, i) {
  return `<div class="trophy-entry" id="te-${i}">
    <input type="text" value="${escHTML(name)}" placeholder="Nome do título" class="te-name" oninput="markUnsaved(); syncRelacao()"/>
    <input type="text" value="${escHTML(year)}" placeholder="Ano" class="te-year" oninput="markUnsaved(); syncRelacao()"/>
    <button class="btn-icon" onclick="removeTrophy(this)" title="Remover">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>`;
}

function bioEntryHTML(text, i) {
  return `<div class="bio-entry" id="be-${i}">
    <span class="bio-para-num">${i+1}</span>
    <textarea class="bio" placeholder="Parágrafo ${i+1}…" oninput="markUnsaved()">${escHTML(text)}</textarea>
    <button class="btn-icon" onclick="removeBio(this)" title="Remover parágrafo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>`;
}

function escHTML(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

/* ════ TROPHY CRUD ════ */
function addTrophy() {
  const list = document.getElementById('trophyList');
  const count = list.querySelectorAll('.trophy-entry').length;
  list.insertAdjacentHTML('beforeend', trophyEntryHTML('', '', count));
  markUnsaved();
}
function removeTrophy(btn) {
  btn.closest('.trophy-entry').remove();
  markUnsaved(); syncRelacao();
}
function syncRelacao() {
  const entries = document.querySelectorAll('.trophy-entry');
  const parts = [];
  entries.forEach(e => {
    const n = e.querySelector('.te-name').value.trim();
    const y = e.querySelector('.te-year').value.trim();
    if (n) parts.push(y ? `${n} – ${y}` : n);
  });
  const ta = document.getElementById('f-relacao');
  if (ta) ta.value = parts.join(', ');
}
function syncTrophyList() {
  const rel = document.getElementById('f-relacao').value;
  const titles = parseTitles(rel);
  const list = document.getElementById('trophyList');
  list.innerHTML = titles.map((t,i) => trophyEntryHTML(t.name, t.year, i)).join('');
}

/* ════ BIO CRUD ════ */
function addBio() {
  const list = document.getElementById('bioList');
  const count = list.querySelectorAll('.bio-entry').length;
  list.insertAdjacentHTML('beforeend', bioEntryHTML('', count));
  markUnsaved();
  // update numbers
  updateBioNumbers();
}
function removeBio(btn) {
  btn.closest('.bio-entry').remove();
  updateBioNumbers(); markUnsaved();
}
function updateBioNumbers() {
  document.querySelectorAll('.bio-para-num').forEach((el, i) => el.textContent = i+1);
}

/* ════ MEDIA ════ */
function previewFoto(url, previewId) {
  const wrap = document.getElementById(previewId + '-wrap');
  const img  = document.getElementById(previewId);
  if (url) { img.src = url; wrap.classList.add('has-photo'); }
  else { wrap.classList.remove('has-photo'); }
}
function clearFoto(inputId, wrapId, imgId) {
  document.getElementById(inputId).value = '';
  document.getElementById(wrapId).classList.remove('has-photo');
  document.getElementById(imgId).src = '';
  markUnsaved();
}
function handleUpload(evt, inputId, previewId, wrapId) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById(inputId).value = e.target.result;
    document.getElementById(previewId).src = e.target.result;
    document.getElementById(wrapId).classList.add('has-photo');
    markUnsaved();
  };
  reader.readAsDataURL(file);
}

/* ════ TABS ════ */
function switchEditorTab(id, btn) {
  document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.editor-section').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  if (id === 'json') updateJSONPreview();
}

/* ════ JSON PREVIEW ════ */
function updateJSONPreview() {
  const el = document.getElementById('jsonPreview');
  if (!el || currentIdx === null) return;
  const obj = buildCoachObject(currentIdx);
  el.textContent = JSON.stringify(obj, null, 2);
}

function buildCoachObject(idx) {
  const c = COACHES[idx];
  const rel = document.getElementById('f-relacao')?.value || c.col_2;
  const bios = [];
  document.querySelectorAll('#bioList textarea').forEach(t => { if (t.value.trim()) bios.push(t.value.trim()); });
  return {
    col_0:  document.getElementById('f-nome')?.value || c.col_0,
    col_1:  document.getElementById('f-titulos')?.value || c.col_1,
    col_2:  rel,
    foto:   document.getElementById('f-foto')?.value || c.foto || '',
    fotoBg: document.getElementById('f-fotobg')?.value || c.fotoBg || '',
    anos:   document.getElementById('f-anos')?.value || c.anos || '',
    nasc:   document.getElementById('f-nasc')?.value || c.nasc || '',
    bios,
    periodo:               c.periodo               || '',
    total_jogos_historico: c.total_jogos_historico || '',
    stats:                 c.stats                 || {},
    conquista: {
      anos: document.getElementById('f-ageYears')?.value || '',
      data: document.getElementById('f-ageDate')?.value || '',
      jogo: document.getElementById('f-ageGame')?.value || '',
    }
  };
}

function copyJSON() {
  const el = document.getElementById('jsonPreview');
  navigator.clipboard.writeText(el.textContent).then(() => showToast('JSON copiado!'));
}

/* ════ SAVE / UNSAVED ════ */
function markUnsaved() {
  unsaved = true;
  const dot = document.getElementById('unsavedDot');
  if (dot) dot.classList.add('visible');
}

function addCoach() {
  const nome = prompt('Nome do novo técnico:');
  if (!nome || !nome.trim()) return;
  const n = nome.trim();

  if (COACHES.find(c => c.col_0 === n)) {
    alert('Já existe um técnico com esse nome.');
    return;
  }

  const emptyStats = { J:'', V:'', E:'', D:'', GM:'', GS:'', pct:'' };
  const newCoach = {
    col_0: n, col_1: '0', col_2: '',
    foto: '', fotoBg: '', anos: '', nasc: '', bios: [], periodo: '',
    total_jogos_historico: 0,
    stats: {
      geral: { ...emptyStats, MM:'', MS:'' },
      competicao: { ...emptyStats },
      morumbi: { ...emptyStats },
      brasileiro: { ...emptyStats },
      libertadores: { ...emptyStats }
    }
  };

  COACHES.push(newCoach);
  EXTRA[n] = { foto: '', fotoBg: '', bios: [''], anos: '', nasc: '' };

  renderSidebar(COACHES);
  updateStats();

  // Select the new coach
  currentIdx = COACHES.length - 1;
  loadCoach(currentIdx);

  showToast(`Técnico "${n}" criado. Preencha os dados e salve.`);
}

function saveCoach(idx) {
  if (idx === null) return;
  const c = COACHES[idx];
  const nome    = document.getElementById('f-nome').value.trim();
  const titulos = document.getElementById('f-titulos').value;
  const relacao = document.getElementById('f-relacao').value;
  const foto    = document.getElementById('f-foto').value;
  const fotoBg  = document.getElementById('f-fotobg').value;
  const anos    = document.getElementById('f-anos').value;
  const nasc    = document.getElementById('f-nasc').value;
  const bios    = [];
  document.querySelectorAll('#bioList textarea').forEach(t => { if (t.value.trim()) bios.push(t.value.trim()); });

  // Update age map
  if (AGE_MAP[c.col_0]) {
    AGE_MAP[c.col_0].col_1 = document.getElementById('f-ageYears').value;
    AGE_MAP[c.col_0].col_3 = document.getElementById('f-ageDate').value;
    AGE_MAP[c.col_0].col_4 = document.getElementById('f-ageGame').value;
  }

  // Update coaches array — preserve stats/periodo from source JSON
  COACHES[idx] = {
    col_0: nome, col_1: titulos, col_2: relacao,
    foto, fotoBg, anos, nasc,
    periodo: COACHES[idx].periodo || '',
    total_jogos_historico: COACHES[idx].total_jogos_historico || '',
    stats: COACHES[idx].stats || {},
    bios,
  };

  // Save extra to localStorage
  EXTRA[nome] = { foto, fotoBg, anos, nasc, bios };
  try { localStorage.setItem('extra_' + nome, JSON.stringify(EXTRA[nome])); } catch(e) {}

  unsaved = false;
  const dot = document.getElementById('unsavedDot');
  if (dot) dot.classList.remove('visible');

  renderSidebar(COACHES);
  updateStats();
  // reactivate
  document.querySelectorAll('.coach-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
  });
  showToast('Técnico salvo com sucesso');
}

function resetCoach(idx) {
  if (!confirm('Resetar todas as alterações deste técnico?')) return;
  localStorage.removeItem('extra_' + COACHES[idx].col_0);
  openCoach(idx);
  showToast('Dados resetados', false);
}

function saveAll() {
  if (currentIdx !== null) saveCoach(currentIdx);
  showToast('Tudo salvo!');
}

/* ════ EXPORT ════ */
function exportJSON() {
  // Build full JSON with all extras
  const t1rows = [{ col_0: 'TÉCNICO', col_1: 'TÍTULOS', col_2: 'RELAÇÃO' }];
  COACHES.forEach(c => {
    const ex = EXTRA[c.col_0] || {};
    t1rows.push({
      col_0: c.col_0,
      col_1: c.col_1,
      col_2: c.col_2,
      foto:   ex.foto   || c.foto   || '',
      fotoBg: ex.fotoBg || c.fotoBg || '',
      anos:   ex.anos   || c.anos   || '',
      nasc:   ex.nasc   || c.nasc   || '',
      bios:   (ex.bios && ex.bios.length) ? ex.bios : (c.bios || []),
      periodo:              c.periodo              || '',
      total_jogos_historico: c.total_jogos_historico || '',
      stats:                c.stats                || {},
    });
  });
  const t2rows = [{ col_0: 'TÉCNICO', col_1: 'ANOS', col_2: 'NASC.', col_3: 'DATA', col_4: 'JOGO' }];
  Object.values(AGE_MAP).forEach(r => t2rows.push(r));
  const output = [{ tabela: 1, linhas: t1rows }, { tabela: 2, linhas: t2rows }];
  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spfc-tecnicos-titulos.json';
  a.click();
  showToast('JSON exportado!');
}

/* ════ TOAST ════ */
function showToast(msg, success = true) {
  const t = document.getElementById('toast');
  t.querySelector('#toastMsg').textContent = msg;
  t.className = 'toast' + (success ? '' : ' error');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ════ BOOT ════ */
init();
</script>
