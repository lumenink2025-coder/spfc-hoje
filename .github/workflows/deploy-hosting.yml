name: Deploy Firebase Hosting

on:
  push:
    branches: [ main ]
    paths:
      - 'data/**'
      - '*.html'
      - 'manifest.json'
      - 'firebase.json'
      - 'sw.js'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create service account file
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/serviceAccountKey.json

      - name: Deploy Hosting
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/serviceAccountKey.json
          npx firebase-tools deploy --only hosting --project spfc-hoje-da329
