<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SPFCHOJE GAMES</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#CC0000;--red2:#990000;--rl:#FF4444;
  --bg:#0D0D0D;--bg2:#161616;--bg3:#1E1E1E;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --txt:#F0F0EB;--txt2:#B8B8B2;--txt3:#888;
  --gold:#C8A84B;--gold2:#E2C97E;
  --font-t:'Bebas Neue',sans-serif;
  --font-b:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-b);background:var(--bg);color:var(--txt);min-height:100dvh;overflow-x:hidden}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;position:sticky;top:0;background:rgba(13,13,13,.95);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid var(--border)}
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.topbar-title{font-family:var(--font-t);font-size:22px;letter-spacing:.06em;flex:1}
.topbar-title span{color:var(--red)}
.user-pill{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 10px 4px 4px;cursor:pointer}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-name{font-size:11px;color:var(--txt2);max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── HERO ── */
.hero{position:relative;padding:24px 16px 20px;overflow:hidden;background:linear-gradient(180deg,#1a0505 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(204,0,0,.15) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-size:9px;letter-spacing:3px;color:var(--red);text-transform:uppercase;margin-bottom:4px}
.hero-title{font-family:var(--font-t);font-size:40px;line-height:1;letter-spacing:.04em}
.hero-title span{color:var(--red)}
.hero-sub{font-size:11px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}

/* ── SECTION HEADER ── */
.sec-head{display:flex;align-items:center;gap:8px;padding:20px 16px 8px}
.sec-line{width:12px;height:1px;background:var(--red)}
.sec-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--txt3)}

/* ── GAME BUTTONS ── */
.games-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 4px}
.game-btn{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;text-decoration:none;color:inherit;transition:border-color .15s,transform .1s;position:relative;overflow:hidden}
.game-btn:active{transform:scale(.96)}
.game-btn.quiz{border-color:rgba(204,0,0,.3)}
.game-btn.wordle{border-color:rgba(91,200,240,.2)}
.game-btn.palpite{border-color:rgba(120,255,100,.2)}
.game-btn-icon{font-size:26px;line-height:1}
.game-btn-name{font-family:var(--font-t);font-size:15px;letter-spacing:.05em}
.game-btn-tag{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);background:var(--bg3);border-radius:4px;padding:2px 6px}
.game-btn-streak{position:absolute;top:6px;right:6px;font-size:9px;color:var(--gold);font-weight:600}

/* ── RANKINGS ── */
.rank-tabs{display:flex;gap:4px;padding:0 16px;margin-bottom:2px;overflow-x:auto;scrollbar-width:none}
.rank-tabs::-webkit-scrollbar{display:none}
.rank-tab{flex-shrink:0;font-family:var(--font-t);font-size:12px;letter-spacing:.06em;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--txt3);cursor:pointer;transition:all .15s}
.rank-tab.active{background:var(--red);border-color:var(--red);color:#fff}

.rank-section{padding:0 16px}
.rank-period-tabs{display:flex;gap:0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:10px}
.rpt{flex:1;font-family:var(--font-t);font-size:11px;letter-spacing:.06em;padding:6px 4px;border:none;background:transparent;color:var(--txt3);border-radius:7px;cursor:pointer;transition:all .15s;text-align:center}
.rpt.active{background:var(--bg3);color:var(--txt);box-shadow:0 2px 6px rgba(0,0,0,.4)}

.rank-list{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.rank-item{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;transition:border-color .15s}
.rank-item.me{border-color:var(--red);background:rgba(204,0,0,.06)}
.rank-item.top1{border-color:rgba(204,168,75,.35)}
.ri-pos{font-family:var(--font-t);font-size:18px;width:28px;text-align:center;flex-shrink:0;color:var(--txt3)}
.top1 .ri-pos{color:var(--gold2)}
.ri-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--txt2);overflow:hidden;flex-shrink:0;border:1px solid var(--border2)}
.ri-avatar img{width:100%;height:100%;object-fit:cover}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-sub{font-size:9px;color:var(--txt3);letter-spacing:1px;margin-top:1px}
.ri-pts{font-family:var(--font-t);font-size:18px;color:var(--gold2);letter-spacing:.02em;flex-shrink:0}
.ri-game-pts{font-size:8px;color:var(--txt3);text-align:right;margin-top:1px}

.rank-empty{text-align:center;padding:24px;color:var(--txt3);font-size:12px}
.rank-loading{text-align:center;padding:20px;color:var(--txt3);font-size:11px;letter-spacing:1px;text-transform:uppercase}
.rank-me-row{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

.login-prompt{margin:0 16px 16px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.lp-icon{font-size:24px;flex-shrink:0}
.lp-text{flex:1}
.lp-title{font-size:13px;font-weight:600;margin-bottom:2px}
.lp-sub{font-size:10px;color:var(--txt3)}
.lp-btn{font-family:var(--font-t);font-size:12px;letter-spacing:.06em;background:var(--red);border:none;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;flex-shrink:0}

.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

.pb{height:64px}
</style>
</head>
<body>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, query, orderBy, limit, getDocs, doc, getDoc, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAsjpwQwio7Y2SREpnrJf0DSb9fySkhlSY",
  authDomain: "spfc-hoje-da329.firebaseapp.com",
  projectId: "spfc-hoje-da329",
  storageBucket: "spfc-hoje-da329.firebasestorage.app",
  messagingSenderId: "116174859005",
  appId: "1:116174859005:web:b1e54b040aef23c9c16c94"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentTab = 'quiz';
let currentPeriod = 'geral';

// ── AUTH ──────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  currentUser = user;
  if(!user){
    document.body.innerHTML = `
      <div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;background:#0D0D0D;font-family:'DM Sans',sans-serif">
        <div style="font-size:48px;margin-bottom:16px">🔒</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.05em;color:#F0F0EB;margin-bottom:8px">ÁREA EXCLUSIVA</div>
        <div style="font-size:13px;color:#888;line-height:1.6;max-width:280px;margin-bottom:28px">Somente usuários cadastrados podem acessar a seção <strong style="color:#F0F0EB">GAMES</strong>.<br>Faça login ou crie sua conta no app.</div>
        <button onclick="history.back()" style="background:transparent;border:1px solid rgba(255,255,255,.15);color:#888;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 24px;border-radius:10px;cursor:pointer">✕ Fechar</button>
      </div>`;
    return;
  }
  const av = document.getElementById('userAvatar');
    const nm = document.getElementById('userName');
    if(av && user.photoURL) av.innerHTML = `<img src="${user.photoURL}">`;
    else if(av) av.textContent = (user.displayName||user.email||'U')[0].toUpperCase();
    if(nm) nm.textContent = user.displayName || user.email || 'Você';
    document.getElementById('userPill').style.display = 'flex';
    loadUserStats(user);
  loadRanking(currentTab, currentPeriod);
});

// ── USER STATS ────────────────────────────────────────────────────
async function loadUserStats(user){
  try{
    const d = await getDoc(doc(db,'users',user.uid));
    if(!d.exists()) return;
    const data = d.data();
    // quiz streak
    const qs = document.getElementById('ghcQuizStreak');
    if(qs) qs.querySelector('span').textContent = data.quizStreak || data.streak || 0;
    // wordle streak
    const ws = document.getElementById('ghcWordleStreak');
    if(ws) ws.querySelector('span').textContent = data.wordleStreak || 0;
    // game buttons streaks
    setStreakBadge('quizStreakBadge', data.quizStreak || data.streak || 0);
    setStreakBadge('wordleStreakBadge', data.wordleStreak || 0);
  }catch(e){ console.warn('user stats:', e); }
}

function setStreakBadge(id, val){
  const el = document.getElementById(id);
  if(el && val > 0) el.textContent = '🔥'+val;
}

// ── RANKING ───────────────────────────────────────────────────────
const PERIOD_FIELD = { diario:'pontosHoje', semanal:'pontosSemana', mensal:'pontosMes', geral:'xp' };
const GAME_COLLECTION = { quiz:'users', wordle:'wordleUsers', palpite:'palpiteUsers' };
const GAME_XP_FIELD = { quiz:'xp', wordle:'xp', palpite:'acertos' };

async function loadRanking(game, period){
  const listEl = document.getElementById('rankList');
  listEl.innerHTML = '<div class="rank-loading"><div class="spinner"></div></div>';

  const col = GAME_COLLECTION[game] || 'users';
  const field = game === 'quiz' ? (PERIOD_FIELD[period] || 'xp') : (GAME_XP_FIELD[game] || 'xp');

  try{
    const q = query(collection(db, col), orderBy(field,'desc'), limit(10));
    const snap = await getDocs(q);
    if(snap.empty){ listEl.innerHTML = '<div class="rank-empty">Nenhum jogador ainda</div>'; return; }

    let html = '';
    let pos = 0;
    let myPos = null;
    snap.forEach(d => {
      pos++;
      const data = d.data();
      const isMe = currentUser && d.id === currentUser.uid;
      if(isMe) myPos = pos;
      const pts = data[field] || 0;
      const name = data.nome || data.displayName || data.email?.split('@')[0] || 'Anônimo';
      const photo = data.photoURL || data.photo || '';
      const ini = name[0]?.toUpperCase() || '?';
      const medal = pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':pos;
      const sub = game==='quiz' ? (data.quizStreak||0)+' dias de sequência'
                : game==='wordle' ? (data.wordleStreak||0)+' dias seguidos'
                : (data.acertos||0)+' palpites certos';
      html += `<div class="rank-item${pos===1?' top1':''}${isMe?' me':''}">
        <div class="ri-pos">${medal}</div>
        <div class="ri-avatar">${photo?`<img src="${photo}" onerror="this.parentElement.textContent='${ini}'">`:`${ini}`}</div>
        <div class="ri-info">
          <div class="ri-name">${isMe?'<b>Você</b>':name}</div>
          <div class="ri-sub">${sub}</div>
        </div>
        <div>
          <div class="ri-pts">${pts.toLocaleString('pt-BR')}</div>
          <div class="ri-game-pts">${game==='palpite'?'acertos':'XP'}</div>
        </div>
      </div>`;
    });

    // se usuário logado não aparece no top10, busca posição dele
    if(currentUser && !myPos){
      html += `<div class="rank-me-row"><div class="rank-item me">
        <div class="ri-pos">—</div>
        <div class="ri-avatar">${currentUser.photoURL?`<img src="${currentUser.photoURL}">`:(currentUser.displayName||'?')[0]}</div>
        <div class="ri-info"><div class="ri-name"><b>Você</b></div><div class="ri-sub">Fora do top 10</div></div>
        <div><div class="ri-pts">—</div></div>
      </div></div>`;
    }

    listEl.innerHTML = html;
  }catch(e){
    console.warn('ranking:', e);
    listEl.innerHTML = '<div class="rank-empty">Erro ao carregar ranking</div>';
  }
}

// ── CONTROLS ──────────────────────────────────────────────────────
window.setGame = function(tab, el){
  currentTab = tab;
  document.querySelectorAll('.rank-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadRanking(currentTab, currentPeriod);
};
window.setPeriod = function(p, el){
  currentPeriod = p;
  document.querySelectorAll('.rpt').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadRanking(currentTab, currentPeriod);
};
</script>

<!-- TOPBAR -->
<div class="topbar">
  <div class="back-btn" onclick="history.back()">‹</div>
  <div class="topbar-title">SPFCHOJE <span>GAMES</span></div>
  <div class="user-pill" id="userPill" style="display:none" onclick="history.back()">
    <div class="user-avatar" id="userAvatar">?</div>
    <span class="user-name" id="userName">...</span>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">Área do Torcedor</div>
  <div class="hero-title">GAMES <span>HUB</span></div>
  <div class="hero-sub">Compete · Rankeia · Domina</div>
</div>

<!-- LOGIN PROMPT removido — auth já feito no main.html -->

<!-- GAMES -->
<div class="sec-head"><div class="sec-line"></div><div class="sec-label">Jogar agora</div></div>
<div class="games-row">
  <a class="game-btn quiz" href="quiz.html">
    <span id="quizStreakBadge" class="game-btn-streak"></span>
    <div class="game-btn-icon">🧠</div>
    <div class="game-btn-name">QUIZ</div>
    <div class="game-btn-tag">6 níveis</div>
  </a>
  <a class="game-btn wordle" href="wondler.html">
    <span id="wordleStreakBadge" class="game-btn-streak"></span>
    <div class="game-btn-icon">🔍</div>
    <div class="game-btn-name">WORDLE</div>
    <div class="game-btn-tag">Diário</div>
  </a>
  <a class="game-btn palpite" href="palpitometro.html">
    <div class="game-btn-icon">⚽</div>
    <div class="game-btn-name">PALPITE</div>
    <div class="game-btn-tag">Ao vivo</div>
  </a>
</div>

<!-- RANKING -->
<div class="sec-head"><div class="sec-line"></div><div class="sec-label">Ranking</div></div>

<div style="padding:0 16px 8px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none">
  <button class="rank-tab active" onclick="setGame('quiz',this)">🧠 QUIZ</button>
  <button class="rank-tab" onclick="setGame('wordle',this)">🔍 WORDLE</button>
  <button class="rank-tab" onclick="setGame('palpite',this)">⚽ PALPITE</button>
</div>

<div class="rank-section">
  <div class="rank-period-tabs">
    <button class="rpt" onclick="setPeriod('diario',this)">HOJE</button>
    <button class="rpt" onclick="setPeriod('semanal',this)">SEMANA</button>
    <button class="rpt" onclick="setPeriod('mensal',this)">MÊS</button>
    <button class="rpt active" onclick="setPeriod('geral',this)">GERAL</button>
  </div>
  <div class="rank-list" id="rankList">
    <div class="rank-loading"><div class="spinner"></div></div>
  </div>
</div>

<div class="pb"></div>
</body>
</html>
