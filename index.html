<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>SPFC Hoje</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#CC0000;--bg:#060606;--txt:#F0EBE3}
html,body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px}
.shield{width:120px;height:auto;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.95)}}
.loading{font-family:'Bebas Neue',Impact,sans-serif;font-size:24px;letter-spacing:4px;color:var(--txt)}
.sub{font-size:12px;color:#666;letter-spacing:2px}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ══ FIREBASE: verifica se usuário já está logado ══ -->
<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const cfg = {
  apiKey:            'AIzaSyAsjpwQwio7Y2SREpnrJf0DSb9fySkhlSY',
  authDomain:        'spfc-hoje-da329.firebaseapp.com',
  projectId:         'spfc-hoje-da329',
  storageBucket:     'spfc-hoje-da329.firebasestorage.app',
  messagingSenderId: '116174859005',
  appId:             '1:116174859005:web:b1e54b040aef23c9c16c94'
};

const app  = getApps().find(a => a.name === '[DEFAULT]') || initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);

// Verifica se usuário está logado e tem perfil completo
onAuthStateChanged(auth, async user => {
  if (!user) {
    // Não logado → vai para cadastro
    window.location.replace('cadastro.html');
    return;
  }

  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (snap.exists() && snap.data().displayName) {
      // Tem perfil completo → vai para main
      window.location.replace('main.html');
    } else {
      // Logado mas sem perfil → vai para cadastro (step 2)
      window.location.replace('cadastro.html');
    }
  } catch(e) {
    // Erro no Firestore → vai para cadastro
    window.location.replace('cadastro.html');
  }
});

// Timeout de segurança: se Firebase não responder em 5s, vai para cadastro
setTimeout(() => {
  if (document.body.style.display !== 'none') {
    window.location.replace('cadastro.html');
  }
}, 5000);
</script>
</head>
<body>
  <img src="https://res.cloudinary.com/dkjlv0hcs/image/upload/v1779945135/c5a68f93-009e-465c-94a8-c6a5e8e54e79_xofudf.png" 
       alt="SPFC Hoje" class="shield">
  <div class="loading">CARREGANDO...</div>
  <div class="sub">SPFC HOJE</div>
</body>
</html>
