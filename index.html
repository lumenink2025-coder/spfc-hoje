<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#CC0000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SPFC Hoje">
<meta name="description" content="O que aconteceu hoje na história do São Paulo Futebol Clube">
<title>SPFC — Hoje na História</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS ──────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --red:#CC0000;--red2:#FF2222;--red3:#8B0000;
  --gold:#C8A84B;--gold2:#E2C97E;
  --bg:#0A0A0A;--bg2:#111;--bg3:#191919;--bg4:#222;
  --border:#2a2a2a;--border2:#333;
  --txt:#F0EBE3;--txt2:#AAA;--txt3:#666;
  --font-title:'Bebas Neue',Impact,sans-serif;
  --font-ui:'Oswald',sans-serif;
  --font-body:'Inter',sans-serif;
}
html{scroll-behavior:smooth;background:var(--bg)}
body{background:var(--bg);color:var(--txt);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}

/* ── SCANLINES ───────────────────────────────────── */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);pointer-events:none;z-index:9999}

/* ── TOP BAR ─────────────────────────────────────── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(10,10,10,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.topbar-logo{display:flex;align-items:center;gap:10px}
.tb-badge{width:30px;height:30px;border-radius:50%;background:conic-gradient(#CC0000 0deg 120deg,#fff 120deg 240deg,#111 240deg 360deg);border:2px solid var(--red);box-shadow:0 0 10px rgba(204,0,0,.4)}
.tb-name{font-family:var(--font-title);font-size:17px;letter-spacing:2px;color:var(--txt)}
.tb-name span{color:var(--red)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-rec{display:flex;align-items:center;gap:5px;font-family:var(--font-body);font-size:9px;color:var(--red);letter-spacing:2px;text-transform:uppercase}
.rec-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
.tb-notif{width:32px;height:32px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:.2s}
.tb-notif:hover{background:var(--red);border-color:var(--red)}

/* ── HERO ────────────────────────────────────────── */
.hero{min-height:100svh;padding:72px 0 0;display:flex;flex-direction:column;position:relative;overflow:hidden}
.hero-gradient{position:absolute;inset:0;background:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(204,0,0,.18) 0%,transparent 65%),linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%)}
.hero-ghost{position:absolute;bottom:0;right:-20px;font-family:var(--font-title);font-size:clamp(120px,35vw,260px);color:rgba(255,255,255,.028);line-height:1;pointer-events:none;user-select:none;letter-spacing:-6px}

.hero-top{position:relative;z-index:2;padding:32px 20px 0}
.hero-date-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(204,0,0,.12);border:1px solid rgba(204,0,0,.25);padding:5px 12px;border-radius:2px;margin-bottom:16px}
.hero-date-tag span{font-family:var(--font-body);font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.hero-title{font-family:var(--font-title);font-size:clamp(52px,14vw,96px);line-height:.88;letter-spacing:1px;margin-bottom:8px}
.hero-title em{color:var(--red);font-style:normal}
.hero-sub{font-family:var(--font-body);font-size:13px;color:var(--txt2);letter-spacing:.5px;margin-bottom:24px}

/* HOJE COUNT */
.hero-count-row{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.hero-count{font-family:var(--font-title);font-size:56px;color:var(--red);line-height:1}
.hero-count-label{font-size:12px;color:var(--txt2);line-height:1.5}
.hero-count-label strong{display:block;color:var(--txt);font-size:14px}

/* SCROLL PILL */
.scroll-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border:1px solid var(--border2);border-radius:999px;font-size:11px;color:var(--txt3);letter-spacing:2px;animation:float 3s ease-in-out infinite;cursor:pointer}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.scroll-arrow{display:inline-block;animation:arrowbounce 1.5s ease-in-out infinite}
@keyframes arrowbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

/* ── NAV TABS ────────────────────────────────────── */
.nav-tabs{position:sticky;top:56px;z-index:150;background:rgba(10,10,10,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex}
.nav-tab{flex:1;padding:12px 8px;font-family:var(--font-ui);font-size:12px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;text-align:center}
.nav-tab.active{color:var(--red);border-bottom-color:var(--red)}
.nav-tab:hover:not(.active){color:var(--txt)}

/* ── PANELS ──────────────────────────────────────── */
.panel{display:none;padding:0 0 100px}
.panel.active{display:block}

/* ── SECTION HEADER ──────────────────────────────── */
.sec-head{padding:24px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.sec-title{font-family:var(--font-ui);font-size:11px;font-weight:400;letter-spacing:3px;color:var(--txt3);text-transform:uppercase}
.sec-count{font-family:var(--font-title);font-size:20px;color:var(--red)}

/* ── EVENT CARDS ─────────────────────────────────── */
.cards-list{padding:0 16px}
.event-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .1s}
.event-card:active{transform:scale(.99)}
.event-card.cat-titulo{border-left:3px solid var(--gold)}
.event-card.cat-fundacao{border-left:3px solid var(--gold)}
.event-card.cat-mundial{border-left:3px solid var(--gold)}
.event-card.cat-vitoria{border-left:3px solid var(--red)}
.event-card.cat-aniversario{border-left:3px solid #4a9eff}
.event-card.cat-estreia{border-left:3px solid #7fff6a}
.event-card.cat-despedida{border-left:3px solid #ff9f40}
.event-card.cat-recorde{border-left:3px solid #bf5fff}

.card-main{padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.card-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.card-info{flex:1;min-width:0}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.card-year{font-family:var(--font-body);font-size:10px;font-weight:600;color:var(--red);letter-spacing:2px}
.card-ago{font-size:10px;color:var(--txt3)}
.card-tag{font-size:9px;letter-spacing:1.5px;padding:2px 7px;border-radius:2px;text-transform:uppercase;font-weight:500}
.tag-titulo,.tag-fundacao,.tag-mundial{background:rgba(200,168,75,.15);color:var(--gold2)}
.tag-vitoria{background:rgba(204,0,0,.15);color:#ff7777}
.tag-aniversario{background:rgba(74,158,255,.12);color:#7cb9ff}
.tag-estreia{background:rgba(127,255,106,.1);color:#9eff8a}
.tag-despedida{background:rgba(255,159,64,.1);color:#ffb96a}
.tag-recorde{background:rgba(191,95,255,.1);color:#d4a0ff}

.card-title{font-family:var(--font-ui);font-size:17px;font-weight:600;color:var(--txt);line-height:1.2;margin-bottom:4px}
.card-desc{font-size:12px;color:var(--txt2);line-height:1.5}
.card-chevron{color:var(--txt3);font-size:18px;flex-shrink:0;margin-top:2px;transition:transform .3s}
.event-card.open .card-chevron{transform:rotate(180deg)}

/* MEDIA INDICATORS */
.card-media-row{display:flex;gap:6px;margin-top:6px}
.media-chip{font-size:9px;letter-spacing:1px;padding:2px 7px;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:2px;color:var(--txt3)}

/* EXPANDED */
.card-expanded{display:none;border-top:1px solid var(--border)}
.event-card.open .card-expanded{display:block}

.card-img-wrap{position:relative;background:var(--bg3);cursor:zoom-in;overflow:hidden}
.card-img-wrap img{width:100%;max-height:240px;object-fit:cover;display:block;filter:sepia(15%) contrast(1.05) brightness(.95);transition:filter .3s}
.card-img-wrap:hover img{filter:sepia(0%) contrast(1.1) brightness(1)}
.img-caption{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.5px}
/* scanline on images */
.card-img-wrap::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:1}

.card-video-wrap{position:relative;padding-bottom:56.25%;background:#000;overflow:hidden}
.card-video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-thumb{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--bg3)}
.video-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.45}
.play-circle{position:relative;z-index:2;width:56px;height:56px;background:rgba(204,0,0,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(204,0,0,.5);transition:.2s}
.video-thumb:hover .play-circle{transform:scale(1.1);background:var(--red2)}
.play-circle::after{content:'';width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:18px solid #fff;margin-left:4px}
.video-label{position:relative;z-index:2;margin-top:10px;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase}

.card-detail{padding:16px}
.detail-text{font-size:13px;color:var(--txt2);line-height:1.75;margin-bottom:14px}
.detail-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.d-stat{background:var(--bg3);padding:10px 12px;border-radius:3px}
.d-stat-label{font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:3px}
.d-stat-val{font-family:var(--font-ui);font-size:15px;font-weight:600;color:var(--txt)}
.card-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-share{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:transparent;border:1px solid var(--border2);color:var(--txt2);font-size:11px;letter-spacing:1.5px;cursor:pointer;border-radius:2px;transition:.2s;font-family:var(--font-body)}
.btn-share:hover{border-color:var(--red);color:var(--txt)}
.btn-vid{background:rgba(204,0,0,.12);border-color:rgba(204,0,0,.3);color:#ff7777}
.btn-vid:hover{background:rgba(204,0,0,.25)}

/* ── EMPTY STATE ─────────────────────────────────── */
.empty{text-align:center;padding:64px 24px}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4}
.empty-title{font-family:var(--font-title);font-size:28px;color:var(--red);letter-spacing:2px;margin-bottom:8px}
.empty-text{font-size:13px;color:var(--txt3);line-height:1.6;max-width:280px;margin:0 auto}

/* ── CALENDAR PANEL ──────────────────────────────── */
.cal-month-nav{display:flex;gap:4px;overflow-x:auto;padding:16px 16px 12px;scrollbar-width:none}
.cal-month-nav::-webkit-scrollbar{display:none}
.month-btn{flex-shrink:0;padding:6px 14px;font-family:var(--font-ui);font-size:11px;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--border2);background:transparent;color:var(--txt3);cursor:pointer;border-radius:2px;transition:.2s}
.month-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.month-btn:hover:not(.active){border-color:rgba(204,0,0,.4);color:var(--txt)}

.cal-grid-wrap{padding:0 16px 16px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-wd{text-align:center;font-size:9px;letter-spacing:1px;color:var(--txt3);padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;background:var(--bg2);border:1px solid transparent;border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:.15s}
.cal-day:empty{background:transparent;cursor:default}
.cal-day.today{background:rgba(204,0,0,.2);border-color:var(--red)!important}
.cal-day.has-events{border-color:var(--border2)}
.cal-day.has-titulo{border-color:rgba(200,168,75,.4)!important}
.cal-day:hover:not(:empty){background:rgba(204,0,0,.1);border-color:rgba(204,0,0,.35)}
.cal-day-num{font-family:var(--font-ui);font-size:13px;font-weight:300;color:var(--txt3);line-height:1}
.cal-day.has-events .cal-day-num{color:var(--txt);font-weight:600}
.cal-day.today .cal-day-num{color:var(--red)}
.cal-dots{position:absolute;bottom:4px;display:flex;gap:2px}
.cal-dot{width:3px;height:3px;border-radius:50%}

.day-events-panel{padding:16px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin:0 16px 16px}
.dep-title{font-family:var(--font-title);font-size:24px;letter-spacing:2px;margin-bottom:12px}
.dep-empty{font-size:12px;color:var(--txt3);padding:8px 0}

/* ── RECORDS PANEL ───────────────────────────────── */
.records-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:0 16px 16px}
.rec-card{background:var(--bg2);padding:20px 16px;border:1px solid var(--border);border-radius:3px;text-align:center}
.rec-num{font-family:var(--font-title);font-size:52px;color:var(--red);line-height:1;margin-bottom:4px}
.rec-label{font-size:10px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase}

.hall-of-fame{padding:0 16px}
.hof-card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden}
.hof-main{padding:14px 16px;display:flex;align-items:center;gap:14px}
.hof-rank{font-family:var(--font-title);font-size:32px;color:var(--red);opacity:.4;width:36px;flex-shrink:0;text-align:center}
.hof-info{flex:1}
.hof-name{font-family:var(--font-ui);font-size:16px;font-weight:600;color:var(--txt);margin-bottom:2px}
.hof-detail{font-size:11px;color:var(--txt2)}
.hof-badge{font-family:var(--font-title);font-size:22px;color:var(--gold);flex-shrink:0}

/* ── GOLEADAS PANEL ──────────────────────────────── */
.goleada-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:3px;padding:14px 16px;margin-bottom:6px}
.gol-score{font-family:var(--font-title);font-size:32px;color:var(--red);line-height:1;margin-bottom:4px}
.gol-detail{font-size:12px;color:var(--txt2)}
.gol-year{font-size:10px;color:var(--txt3);letter-spacing:2px;margin-top:4px}

/* ── LIGHTBOX ────────────────────────────────────── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:.3s}
.lightbox.open{opacity:1;visibility:visible}
.lightbox img{max-width:100%;max-height:80vh;object-fit:contain}
.lb-cap{margin-top:12px;font-size:12px;color:rgba(255,255,255,.5);text-align:center}
.lb-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--txt);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── TOAST ───────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--red);border-left-width:3px;padding:12px 18px;max-width:320px;width:calc(100% - 32px);z-index:3000;border-radius:3px;transition:.35s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-t{font-family:var(--font-ui);font-size:14px;font-weight:600;color:var(--txt);margin-bottom:3px}
.toast-b{font-size:11px;color:var(--txt2)}

/* ── INSTALL BANNER ──────────────────────────────── */
.install-bar{display:none;align-items:center;gap:12px;padding:12px 16px;background:rgba(204,0,0,.08);border-bottom:1px solid rgba(204,0,0,.2)}
.install-bar.show{display:flex}
.install-bar-text{flex:1;font-size:12px;color:var(--txt2)}
.install-bar-text strong{display:block;color:var(--txt);font-size:13px;margin-bottom:2px}
.install-bar-btn{background:var(--red);color:#fff;border:none;padding:8px 16px;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:2px;flex-shrink:0;font-family:var(--font-body)}

/* ── BOTTOM SHARE BAR ────────────────────────────── */
.share-fab{position:fixed;bottom:24px;right:20px;z-index:100;width:48px;height:48px;background:var(--red);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 20px rgba(204,0,0,.4);display:flex;align-items:center;justify-content:center;transition:.2s}
.share-fab:hover{background:var(--red2);transform:scale(1.08)}

/* ── RESPONSIVE ──────────────────────────────────── */
@media(min-width:480px){
  .hero-top,.cards-list,.sec-head,.cal-month-nav,.cal-grid-wrap,.hall-of-fame,.records-grid{padding-left:24px;padding-right:24px}
  .day-events-panel{margin-left:24px;margin-right:24px}
}
@media(min-width:768px){
  .records-grid{grid-template-columns:repeat(4,1fr)}
  .hero-title{font-size:120px}
}

/* ── ANIMATIONS ──────────────────────────────────── */
.fade-in{animation:fadein .4s ease both}
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-logo">
    <div class="tb-badge"></div>
    <div class="tb-name"><span>SÃO PAULO</span> FC</div>
  </div>
  <div class="tb-right">
    <div class="tb-rec"><div class="rec-dot"></div>AO VIVO</div>
    <div class="tb-notif" onclick="askNotif()" title="Notificações">🔔</div>
  </div>
</header>

<!-- INSTALL BANNER -->
<div class="install-bar" id="installBar">
  <div class="install-bar-text">
    <strong>Adicionar à tela inicial</strong>
    Acesse o histórico do SPFC todos os dias
  </div>
  <button class="install-bar-btn" onclick="installPWA()">INSTALAR</button>
</div>

<!-- HERO -->
<section class="hero" id="heroSection">
  <div class="hero-gradient"></div>
  <div class="hero-ghost" id="heroGhost"></div>
  <div class="hero-top">
    <div class="hero-date-tag">
      <span id="heroDateLabel">carregando...</span>
    </div>
    <div class="hero-title">O QUE<br><em>ACONTECEU</em><br>HOJE</div>
    <div class="hero-sub">na história do São Paulo Futebol Clube</div>
    <div class="hero-count-row">
      <div class="hero-count" id="heroCount">0</div>
      <div class="hero-count-label">
        <strong id="heroCountLabel">eventos</strong>
        encontrados hoje
      </div>
    </div>
    <div class="scroll-pill" onclick="scrollToContent()">
      VER HISTÓRICO <span class="scroll-arrow">↓</span>
    </div>
  </div>
</section>

<!-- NAV TABS -->
<nav class="nav-tabs" id="navTabs">
  <button class="nav-tab active" onclick="showPanel('hoje',this)">HOJE</button>
  <button class="nav-tab" onclick="showPanel('calendario',this)">CALENDÁRIO</button>
  <button class="nav-tab" onclick="showPanel('records',this)">RECORDES</button>
  <button class="nav-tab" onclick="showPanel('goleadas',this)">GOLEADAS</button>
</nav>

<!-- PANEL: HOJE -->
<div class="panel active" id="panel-hoje">
  <div class="sec-head">
    <div class="sec-title">// eventos de hoje</div>
    <div class="sec-count" id="secCount">0</div>
  </div>
  <div class="cards-list" id="todayList"></div>
</div>

<!-- PANEL: CALENDÁRIO -->
<div class="panel" id="panel-calendario">
  <div class="cal-month-nav" id="calMonthNav"></div>
  <div class="cal-grid-wrap">
    <div class="cal-weekdays" id="calWD"></div>
    <div class="cal-grid" id="calGrid"></div>

const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTHS_S=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
const WD=['D','S','T','Q','Q','S','S'];
const CATS={vitoria:'VITÓRIA',titulo:'TÍTULO',aniversario:'ANIVERSÁRIO',estreia:'ESTREIA',despedida:'DESPEDIDA',recorde:'RECORDE',mundial:'MUNDIAL',fundacao:'FUNDAÇÃO'};
const CAT_COLORS={vitoria:'#CC0000',titulo:'#C8A84B',mundial:'#C8A84B',fundacao:'#C8A84B',aniversario:'#4a9eff',estreia:'#7fff6a',despedida:'#ff9f40',recorde:'#bf5fff'};

const NOW=new Date();
const TODAY_D=NOW.getDate(), TODAY_M=NOW.getMonth()+1, TODAY_Y=NOW.getFullYear();
let CAL_M=TODAY_M, CAL_Y=TODAY_Y;
let deferredPrompt=null;

function ev(m,d){return(DB[m]&&DB[m][d])||[];}
function allEvs(){let a=[];for(let m=1;m<=12;m++)for(let d=1;d<=31;d++){const e=ev(m,d);if(e.length)e.forEach(x=>a.push({...x,month:m,day:d}));}return a;}
function yearsAgo(y){if(!y)return'';const d=TODAY_Y-y;return d===0?'este ano':`há ${d} anos`;}
function tagCls(t){const m={titulo:'titulo',fundacao:'titulo',mundial:'titulo',vitoria:'vitoria',aniversario:'aniversario',estreia:'estreia',despedida:'despedida',recorde:'recorde'};return m[t]||'vitoria';}

/* ═══════════════════════════════════════════════════
   CARD BUILDER
═══════════════════════════════════════════════════ */
let cardIdSeq=0;
function buildCard(ev,idx){
  const id='card_'+(cardIdSeq++);
  const cls=tagCls(ev.t);
  const ctx=ev.ctx||'';
  const stats=ev.stats||[];
  const hasVideo=!!ev.video;
  const hasImg=!!ev.image;
  const hasMedia=hasVideo||hasImg;
  const hasDetail=!!(ctx||stats.length||hasMedia);

  const chips=[];
  if(hasVideo)chips.push('<span class="media-chip">🎬 VÍDEO</span>');
  if(hasImg)chips.push('<span class="media-chip">📷 FOTO</span>');

  const statsHTML=stats.map(s=>`<div class="d-stat"><div class="d-stat-label">${s.l}</div><div class="d-stat-val">${s.v}</div></div>`).join('');

  const imgHTML=hasImg?`<div class="card-img-wrap" onclick="openLB(event,'${ev.image}','${(ev.imgCap||ev.n).replace(/'/g,'\\\'')}')" style="max-height:240px;overflow:hidden"><img src="${ev.image}" alt="${ev.n}" loading="lazy"><div class="img-caption">📷 ${ev.imgCap||ev.n}</div></div>`:'';

  const vidHTML=hasVideo?`<div class="card-video-wrap"><div class="video-thumb" onclick="loadVid(event,this,'${ev.video}')"><img src="https://img.youtube.com/vi/${ev.video}/hqdefault.jpg" alt="${ev.n}"><div class="play-circle"></div><div class="video-label">▶ ASSISTIR</div></div></div>`:'';

  const chevron=hasDetail?`<span class="card-chevron">⌄</span>`:'';

  const expandedHTML=hasDetail?`<div class="card-expanded">
    ${imgHTML}${vidHTML}
    ${ctx?`<div class="card-detail"><div class="detail-text">${ctx}</div>${statsHTML?`<div class="detail-stats">${statsHTML}</div>`:''}
    <div class="card-actions"><button class="btn-share" onclick="shareEvent(event,'${ev.n.replace(/'/g,'\\\'')}',${ ev.y||0})">↗ COMPARTILHAR</button>${hasVideo?`<button class="btn-share btn-vid" onclick="loadVid(event,this.closest('.card-expanded').querySelector('.video-thumb'),'${ev.video}')">🎬 VER VÍDEO</button>`:''}</div></div>`:`<div class="card-detail">${statsHTML?`<div class="detail-stats">${statsHTML}</div>`:''}${hasMedia?'':''}<div class="card-actions"><button class="btn-share" onclick="shareEvent(event,'${ev.n.replace(/'/g,'\\\'')}',${ ev.y||0})">↗ COMPARTILHAR</button></div></div>`}
  </div>`:'';

  return`<div class="event-card cat-${ev.t} fade-in" id="${id}" ${hasDetail?`onclick="toggleCard('${id}')"`:''}>
    <div class="card-main">
      <div class="card-icon">${ev.e}</div>
      <div class="card-info">
        <div class="card-meta">
          <span class="card-year">${ev.y||'—'}</span>
          <span class="card-ago">${yearsAgo(ev.y)}</span>
          <span class="card-tag tag-${cls}">${CATS[ev.t]||ev.t.toUpperCase()}</span>
        </div>
        <div class="card-title">${ev.n}</div>
        <div class="card-desc">${ev.d}</div>
        ${chips.length?`<div class="card-media-row">${chips.join('')}</div>`:''}
      </div>
      ${chevron}
    </div>
    ${expandedHTML}
  </div>`;
}

function toggleCard(id){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.toggle('open');
}

function loadVid(e,thumb,vid){
  e.stopPropagation();
  const wrap=thumb?thumb.parentElement:e.currentTarget.closest('.card-video-wrap');
  if(wrap)wrap.innerHTML=`<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
}

function openLB(e,src,cap){
  e.stopPropagation();
  document.getElementById('lbImg').src=src;
  document.getElementById('lbCap').textContent=cap;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLB(e){e.stopPropagation();document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}

function shareEvent(e,name,year){
  e.stopPropagation();
  const txt=`🔴⚪⚫ ${name}${year?` (${year})`:''}  — São Paulo FC\n#SPFC #SãoPaulo\n${location.href}`;
  if(navigator.share)navigator.share({text:txt}).catch(()=>{});
  else navigator.clipboard.writeText(txt).then(()=>toast('Copiado!','Texto copiado para área de transferência'));
}

function renderHoje(){
  const events=ev(TODAY_M,TODAY_D);
  document.getElementById('heroCount').textContent=events.length;
  document.getElementById('heroCountLabel').textContent=events.length===1?'evento':'eventos';
  document.getElementById('heroGhost').textContent=String(TODAY_D).padStart(2,'0');
  document.getElementById('heroDateLabel').textContent=`${MONTHS[TODAY_M-1].toUpperCase()} ${TODAY_D}, ${TODAY_Y}`;
  document.getElementById('secCount').textContent=events.length;

  const list=document.getElementById('todayList');
  if(!events.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">📼</div><div class="empty-title">Arquivo em silêncio</div><div class="empty-text">Nenhum registro histórico encontrado para hoje. Mas o São Paulo faz história todos os dias.</div></div>`;
    return;
  }
  const pri={fundacao:0,titulo:1,mundial:1,vitoria:2,aniversario:3,estreia:4,despedida:5,recorde:1};
  const sorted=[...events].sort((a,b)=>(pri[a.t]||9)-(pri[b.t]||9));
  list.innerHTML=sorted.map((ev,i)=>buildCard(ev,i)).join('');
}

function renderCalMonthNav(){
  const nav=document.getElementById('calMonthNav');
  nav.innerHTML=MONTHS_S.map((m,i)=>`<button class="month-btn${i+1===CAL_M?' active':''}" onclick="selectCalMonth(${i+1},this)">${m}</button>`).join('');
}

function selectCalMonth(m,btn){
  CAL_M=m;
  document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCalGrid();
  document.getElementById('dayPanel').style.display='none';
}

function getDIM(m,y){return new Date(y,m,0).getDate();}
function getFD(m,y){return new Date(y,m-1,1).getDay();}

function renderCalGrid(){
  const wd=document.getElementById('calWD');
  wd.innerHTML=WD.map(d=>`<div class="cal-wd">${d}</div>`).join('');

  const days=getDIM(CAL_M,CAL_Y),first=getFD(CAL_M,CAL_Y);
  let html='';
  for(let i=0;i<first;i++)html+=`<div class="cal-day"></div>`;
  for(let d=1;d<=days;d++){
    const evs=ev(CAL_M,d);
    const isToday=d===TODAY_D&&CAL_M===TODAY_M;
    const hasTit=evs.some(e=>e.t==='titulo'||e.t==='mundial'||e.t==='fundacao');
    let cls='cal-day';
    if(evs.length)cls+=' has-events';
    if(isToday)cls+=' today';
    if(hasTit)cls+=' has-titulo';
    const dots=[...new Set(evs.map(e=>e.t))].slice(0,3).map(t=>`<div class="cal-dot" style="background:${CAT_COLORS[t]||'#CC0000'}"></div>`).join('');
    html+=`<div class="${cls}" onclick="selectCalDay(${d})"><div class="cal-day-num">${d}</div>${evs.length?`<div class="cal-dots">${dots}</div>`:''}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

function selectCalDay(d){
  const evs=ev(CAL_M,d);
  const panel=document.getElementById('dayPanel');
  document.getElementById('dayPanelTitle').textContent=`${d} de ${MONTHS[CAL_M-1]}`;
  const list=document.getElementById('dayPanelList');
  list.innerHTML=evs.length?evs.map((e,i)=>buildCard(e,i)).join(''):`<div class="dep-empty">Nenhum evento registrado nesta data.</div>`;
  panel.style.display='block';
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo({top:document.getElementById('navTabs').offsetTop-56,behavior:'smooth'});
}

function scrollToContent(){
  document.getElementById('navTabs').scrollIntoView({behavior:'smooth'});
}

═══════════════════════════════════════════════════ */
function shareDay(){
  const evs=ev(TODAY_M,TODAY_D);
  const lines=evs.slice(0,3).map(e=>`${e.e} ${e.n}${e.y?` (${e.y})`:''}`).join('\n');
  const txt=evs.length
    ?`🔴⚪⚫ HOJE NA HISTÓRIA DO SPFC\n${MONTHS[TODAY_M-1].toUpperCase()} ${TODAY_D}, ${TODAY_Y}\n\n${lines}\n\n#SPFC #SãoPaulo\n${location.href}`
    :`🔴⚪⚫ Hoje na história do São Paulo FC\n${MONTHS[TODAY_M-1].toUpperCase()} ${TODAY_D}\n\n#SPFC #SãoPaulo`;
  if(navigator.share)navigator.share({title:'SPFC — Hoje na História',text:txt}).catch(()=>{});
  else navigator.clipboard.writeText(txt).then(()=>toast('Copiado!','Compartilhe com os amigos torcedores'));
}

// ── SISTEMA DE NOTIFICAÇÕES COMPLETO ──────────────
let swReg = null; // guarda o registro do SW

async function registerSW() {
  if (!('serviceWorker' in navigator)) return null;
  try {
    swReg = await navigator.serviceWorker.register('sw.js');
    // Avisa SW para reagendar ao carregar a página
    const sw = swReg.active || swReg.installing || swReg.waiting;
    if (sw) sw.postMessage({ type: 'RESCHEDULE' });
    return swReg;
  } catch(e) {
    console.warn('SW registration failed:', e);
    return null;
  }
}

async function askNotif() {
  // 1. Verifica suporte
  if (!('Notification' in window)) {
    toast('Não suportado 😔', 'Seu navegador não suporta notificações. Tente no Chrome ou Edge.');
    return;
  }

  // 2. Se já permitido — mostra opções
  if (Notification.permission === 'granted') {
    toast('🔔 Notificações ativas!', 'Você já recebe o histórico diário do SPFC às 8h.');
    // Botão de teste no toast — dispara notificação de teste
    setTimeout(() => testNotif(), 1000);
    return;
  }

  // 3. Se bloqueado
  if (Notification.permission === 'denied') {
    toast('Bloqueado ❌', 'Acesse as configurações do navegador → site → Notificações → Permitir.');
    return;
  }

  // 4. Pede permissão
  toast('Aguarde...', 'Solicitando permissão de notificação');
  const perm = await Notification.requestPermission();

  if (perm === 'granted') {
    // Atualiza ícone no topbar
    const btn = document.querySelector('.tb-notif');
    if (btn) { btn.textContent = '🔔'; btn.style.background = 'rgba(204,0,0,0.2)'; }

    // Esconde barra de convite
    const nb = document.getElementById('notifBar');
    if (nb) nb.style.display = 'none';

    toast('🔔 Ativado!', 'Você receberá o histórico do SPFC todos os dias às 8h!', 4000);

    // Garante que o SW está registrado e agenda
    if (!swReg) await registerSW();
    const sw = swReg && (swReg.active || swReg.installing || swReg.waiting);
    if (sw) sw.postMessage({ type: 'RESCHEDULE' });

    // Dispara notificação de boas-vindas após 2s
    setTimeout(() => testNotif(), 2000);

  } else {
    toast('Permissão negada', 'Sem as notificações você pode perder os momentos históricos de hoje!');
  }
}

async function testNotif() {
  // Usa o SW para disparar — funciona mesmo com app em segundo plano
  if (!swReg) await registerSW();

  const sw = swReg && (swReg.active || swReg.installing || swReg.waiting);
  if (sw && Notification.permission === 'granted') {
    sw.postMessage({ type: 'TEST_NOTIF' });
    return;
  }

  // Fallback: Notification API direta (só funciona com app aberto)
  if (Notification.permission === 'granted') {
    const evs = ev(TODAY_M, TODAY_D);
    const body = evs.length
      ? `${evs[0].e} ${evs[0].n}${evs[0].y ? ` (${evs[0].y})` : ''}. Abra para saber mais!`
      : 'Hoje o São Paulo escreveu história. Venha reviver!';
    try {
      const n = new Notification('🔴 São Paulo FC — Hoje na História', {
        body,
        icon: 'icons/icon-192.png',
        badge: 'icons/badge-72.png',
        tag: 'spfc-teste'
      });
      n.onclick = () => window.focus();
    } catch(e) {}
  }
}

function updateNotifUI() {
  const btn = document.querySelector('.tb-notif');
  if (!btn) return;
  if (!('Notification' in window)) {
    btn.style.display = 'none';
    return;
  }
  if (Notification.permission === 'granted') {
    btn.textContent = '🔔';
    btn.style.background = 'rgba(204,0,0,0.2)';
    btn.style.borderColor = 'rgba(204,0,0,0.4)';
    btn.title = 'Notificações ativas — clique para testar';
    // Esconde barra de convite
    const nb = document.getElementById('notifBar');
    if (nb) nb.style.display = 'none';
  } else if (Notification.permission === 'denied') {
    btn.textContent = '🔕';
    btn.title = 'Notificações bloqueadas';
  } else {
    btn.textContent = '🔔';
    btn.title = 'Ativar notificações diárias';
  }
}

function toast(title,body,dur=3500){
  document.getElementById('toastT').textContent=title;
  document.getElementById('toastB').textContent=body;
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// PWA
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBar').classList.add('show');});
function installPWA(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(r=>{if(r.outcome==='accepted'){document.getElementById('installBar').classList.remove('show');toast('✅ Instalado!','O app do SPFC foi adicionado à sua tela inicial');}deferredPrompt=null;});}
