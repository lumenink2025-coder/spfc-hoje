<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SPFC Hoje</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;color:#fff;font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
#loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;background:#000}
#loader img{width:120px;height:auto;margin-bottom:24px;animation:pulse 2s ease-in-out infinite}
#loader p{font-size:14px;letter-spacing:3px;color:#CC0000;text-transform:uppercase}
@keyframes pulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
</style>
<!-- Firebase -->
<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const cfg = {
  apiKey:'AIzaSyAsjpwQwio7Y2SREpnrJf0DSb9fySkhlSY',
  authDomain:'spfc-hoje-da329.firebaseapp.com',
  projectId:'spfc-hoje-da329',
  storageBucket:'spfc-hoje-da329.firebasestorage.app',
  messagingSenderId:'116174859005',
  appId:'1:116174859005:web:b1e54b040aef23c9c16c94'
};
const app = getApps().find(a=>a.name==='[DEFAULT]') || initializeApp(cfg);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async user => {
  if (!user) {
    // Não logado → vai para cadastro
    window.location.replace('cadastro.html');
    return;
  }
  // Logado → verifica se tem perfil
  try {
    const snap = await getDoc(doc(db, 'usuarios', user.uid));
    if (snap.exists()) {
      window.location.replace('main.html');
    } else {
      window.location.replace('cadastro.html?step=2');
    }
  } catch(e) {
    window.location.replace('main.html');
  }
});

// Timeout de segurança: se não redirecionar em 5s, vai para cadastro
setTimeout(() => {
  if (window.location.pathname === '/' || window.location.pathname === '/index.html') {
    window.location.replace('cadastro.html');
  }
}, 5000);
</script>
</head>
<body>
<div id="loader">
  <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔴⚪⚫%3C/text%3E%3C/svg%3E" alt="SPFC">
  <p>Carregando...</p>
</div>
</body>
</html>
