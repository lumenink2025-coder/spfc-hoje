<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>SPFC Hoje</title>
<style>
:root{
  --spfc-red:#CC0000;
  --spfc-red-bright:#FF0A0A;
  --spfc-red-dark:#8B0000;
  --spfc-white:#FFFFFF;
  --spfc-white-dim:#E8E8E8;
  --spfc-black:#000000;
  --font-display:'Bebas Neue',Impact,sans-serif;
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;
  background:var(--spfc-black);
  font-family:var(--font-body);
  overflow:hidden;
}

.splash-ultimate{
  position:fixed;inset:0;z-index:100000;
  background:var(--spfc-black);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}

/* Layer 0: Túnel */
.tunnel-bg{
  position:absolute;inset:0;z-index:1;
  background-size:cover;
  background-position:center 30%;
  transform:scale(1.15);
  filter:brightness(0.22) contrast(1.3) saturate(0.5);
  animation:tunnelZoom 20s ease-out forwards;
}
@keyframes tunnelZoom{
  from{transform:scale(1.15) translateY(0)}
  to{transform:scale(1.0) translateY(-2%)}
}

/* Layer 1: Perspectiva */
.tunnel-perspective{
  position:absolute;inset:0;z-index:2;
  background:
    radial-gradient(ellipse 50% 100% at 50% 50%, transparent 30%, rgba(0,0,0,0.7) 70%, rgba(0,0,0,0.95) 100%),
    linear-gradient(180deg, 
      rgba(0,0,0,0.9) 0%, 
      rgba(0,0,0,0.3) 40%, 
      rgba(0,0,0,0.1) 60%,
      rgba(0,0,0,0.4) 80%,
      rgba(0,0,0,0.95) 100%
    );
  pointer-events:none;
}

/* Layer 2: Luz do fundo */
.tunnel-light{
  position:absolute;inset:0;z-index:3;
  background:
    radial-gradient(ellipse 30% 25% at 50% 55%, 
      rgba(204,0,0,0.15) 0%, 
      rgba(200,168,75,0.05) 30%,
      transparent 60%
    );
  animation:lightPulse 4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes lightPulse{
  0%,100%{opacity:0.6}
  50%{opacity:1}
}

/* Layer 3: Poeira */
#dust-canvas{
  position:absolute;inset:0;z-index:4;
  pointer-events:none;
}

/* Layer 4: Scanlines */
.tunnel-scanlines{
  position:absolute;inset:0;z-index:5;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events:none;
}

/* Layer 5: Grain */
.tunnel-grain{
  position:absolute;inset:0;z-index:6;
  opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events:none;
  animation:grainMove 0.4s steps(8) infinite;
}
@keyframes grainMove{
  0%,100%{transform:translate(0,0)}
  12%{transform:translate(-1%,-1%)}
  25%{transform:translate(1%,1%)}
  37%{transform:translate(-1%,1%)}
  50%{transform:translate(1%,-1%)}
  62%{transform:translate(-1%,-1%)}
  75%{transform:translate(1%,1%)}
  87%{transform:translate(-1%,1%)}
}

/* ═══════════════════════════════════════════════════════════
   CONTEÚDO CENTRAL
═══════════════════════════════════════════════════════════ */
.splash-content{
  position:relative;z-index:20;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  width:100%;
  padding:24px 24px 100px 24px;
  min-height:100vh;
}

/* ── Escudo SPFC ── */
.shield-real{
  width:min(180px,42vw);
  height:auto;
  margin-bottom:28px;
  opacity:0;
  transform:scale(0.7) translateY(40px);
  filter:drop-shadow(0 0 60px rgba(204,0,0,0.25));
  animation:shieldEnter 1.4s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
  position:relative;
}
@keyframes shieldEnter{
  to{
    opacity:1;
    transform:scale(1) translateY(0);
    filter:drop-shadow(0 0 80px rgba(204,0,0,0.4));
  }
}

.shield-real::after{
  content:'';
  position:absolute;inset:-20%;
  background:radial-gradient(ellipse 50% 50% at 50% 50%, rgba(204,0,0,0.2), transparent 70%);
  animation:shieldGlow 3s ease-in-out infinite alternate;
  pointer-events:none;
}
@keyframes shieldGlow{
  from{opacity:0.5}
  to{opacity:1}
}

.shield-real img{
  width:100%;height:auto;
  display:block;
  position:relative;z-index:2;
}

/* ── Linha divisória ── */
.divider-red{
  width:60px;height:2px;
  background:linear-gradient(90deg, transparent, var(--spfc-red), transparent);
  margin-bottom:24px;
  opacity:0;
  transform:scaleX(0);
  animation:dividerExpand 0.8s ease 1.8s forwards;
}
@keyframes dividerExpand{
  to{opacity:1;transform:scaleX(1)}
}

/* ── Texto principal ── */
.splash-title{
  font-family:var(--font-display);
  font-size:clamp(48px,13vw,78px);
  line-height:0.9;
  letter-spacing:4px;
  margin-bottom:10px;
  text-shadow:0 4px 30px rgba(0,0,0,0.8);
  text-align:center;
  opacity:0;
  animation:textFadeIn 1s ease 2.2s forwards;
}
.title-spfc{
  color:var(--spfc-white);
}
.title-hoje{
  color:var(--spfc-red);
  text-shadow:0 0 40px rgba(204,0,0,0.5), 0 4px 30px rgba(0,0,0,0.8);
}

.text-main{
  text-align:center;
  opacity:0;
  animation:textFadeIn 1s ease 2.2s forwards;
}

.text-title{
  font-family:var(--font-display);
  font-size:clamp(48px,13vw,78px);
  line-height:0.9;
  letter-spacing:4px;
  color:var(--spfc-white);
  margin-bottom:10px;
  text-shadow:0 4px 30px rgba(0,0,0,0.8);
}

.text-title .red{
  color:var(--spfc-red);
  text-shadow:0 0 40px rgba(204,0,0,0.5), 0 4px 30px rgba(0,0,0,0.8);
}

.text-sub{
  font-family:var(--font-body);
  font-size:13px;
  font-weight:300;
  color:var(--spfc-white-dim);
  letter-spacing:1px;
  line-height:1.7;
  max-width:300px;
  margin:0 auto;
  text-shadow:0 2px 10px rgba(0,0,0,0.9);
}

/* ── Botões de login ── */
.login-area{
  width:100%;max-width:340px;
  margin-top:40px;
  display:flex;flex-direction:column;gap:10px;
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 3.0s forwards;
}

.btn-spfc{
  position:relative;
  width:100%;padding:15px 20px;
  border:none;border-radius:10px;
  font-family:var(--font-body);
  font-size:13px;font-weight:600;
  letter-spacing:0.8px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.2s cubic-bezier(0.22,1,0.36,1);
  overflow:hidden;
}

.btn-spfc::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.08) 50%,transparent 60%);
  background-size:200% 100%;
  opacity:0;
}
.btn-spfc:hover::before{
  opacity:1;
  animation:shimmerBtn 1.2s linear infinite;
}
@keyframes shimmerBtn{
  from{background-position:200% 0}
  to{background-position:-200% 0}
}

.btn-spfc:hover{
  transform:translateY(-2px);
}
.btn-spfc:active{
  transform:scale(0.97);
}

/* Botão 1 — Vermelho (Gmail) */
.btn-gmail{
  background:linear-gradient(135deg, var(--spfc-red) 0%, var(--spfc-red-dark) 100%);
  color:var(--spfc-white);
  box-shadow:0 4px 24px rgba(204,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
}
.btn-gmail:hover{
  box-shadow:0 8px 32px rgba(204,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
}

/* Botão 2 — Branco (Email próprio) */
.btn-email{
  background:var(--spfc-white);
  color:var(--spfc-black);
  box-shadow:0 4px 24px rgba(255,255,255,0.1), inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-email:hover{
  box-shadow:0 8px 32px rgba(255,255,255,0.2);
  background:#f5f5f5;
}

/* Botão 3 — Branco outline (Visitante) */
.btn-visitante{
  background:transparent;
  color:var(--spfc-white);
  border:1px solid rgba(255,255,255,0.2);
}
.btn-visitante:hover{
  background:rgba(255,255,255,0.06);
  border-color:rgba(255,255,255,0.35);
}

.btn-icon{
  font-size:16px;
  display:flex;align-items:center;
}

/* ── Footer ── */
.splash-footer{
  position:absolute;bottom:0;left:0;right:0;
  padding:16px 24px 24px;
  text-align:center;z-index:20;
  opacity:0;
  animation:fadeIn 0.6s ease 3.6s forwards;
  background:linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0.9) 100%);
}

.footer-text{
  font-size:9px;
  color:rgba(255,255,255,0.2);
  letter-spacing:1px;
  line-height:1.6;
}
.footer-text a{
  color:rgba(255,255,255,0.35);
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* ═══════════════════════════════════════════════════════════
   LOADING / TRANSITION
═══════════════════════════════════════════════════════════ */
.transition-overlay{
  position:absolute;inset:0;z-index:100;
  background:var(--spfc-black);
  opacity:0;pointer-events:none;
  transition:opacity 0.6s ease;
}
.transition-overlay.active{
  opacity:1;pointer-events:all;
}

.loading-text{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:101;
  font-family:var(--font-display);
  font-size:14px;
  letter-spacing:6px;
  color:var(--spfc-red);
  opacity:0;
}
.loading-text.active{
  opacity:1;
  animation:loadingPulse 1s ease-in-out infinite;
}
@keyframes loadingPulse{
  0%,100%{opacity:0.4}
  50%{opacity:1}
}

/* ═══════════════════════════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════════════════════════ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes textFadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms!important;
    animation-iteration-count:1!important;
    transition-duration:0.01ms!important;
  }
}

/* Desktop */
@media(min-width:768px){
  .shield-real{width:220px}
  .text-title{font-size:84px}
  .login-area{max-width:380px}
}

/* ══ BOTÕES PRINCIPAIS ══ */
.splash-sub{
  color:rgba(255,255,255,0.55);
  font-size:13px;
  letter-spacing:0.8px;
  text-align:center;
  margin-bottom:28px;
  font-family:var(--font-body);
  opacity:0;
  animation:fadeUp 0.8s ease 2.8s forwards;
}
.splash-buttons{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;margin:0 auto;opacity:0;animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 3.0s forwards;}

.btn-login{
  background:linear-gradient(135deg,#CC0000 0%,#8B0000 100%);
  color:#fff;border:none;
  box-shadow:0 8px 32px rgba(204,0,0,.5),0 0 0 1px rgba(255,255,255,.06) inset;
}
.btn-login:hover{
  box-shadow:0 12px 40px rgba(204,0,0,.65),0 0 0 1px rgba(255,255,255,.1) inset;
  transform:translateY(-2px);
}

.btn-cadastro{
  background:#FFFFFF;
  color:#000000!important;
  color:#fff;
  border:none!important;
}
.btn-cadastro:hover{
  background:#F0F0F0;
  border-color:transparent!important;
  transform:translateY(-2px);
}

.btn-visitante{
  background:#000000!important;
  color:#FFFFFF!important;
  border:1px solid rgba(255,255,255,0.2)!important;
  font-size:11px!important;
  letter-spacing:2px!important;
  padding:10px!important;
  box-shadow:none!important;
}
.btn-visitante:hover{
  color:#FFFFFF!important;
  background:#111111!important;
  border-color:rgba(255,255,255,0.35)!important;
  transform:none!important;
  box-shadow:none!important;
}
.btn-visitante::before{display:none!important}

/* MODAL LOGIN */
.login-modal{display:none;position:fixed;inset:0;z-index:300000;
  background:rgba(0,0,0,.92);align-items:center;justify-content:center;padding:24px}
.login-modal.open{display:flex}
.login-box{width:100%;max-width:360px;background:#111;
  border:1px solid rgba(204,0,0,.3);border-radius:20px;padding:32px 24px;position:relative}
.login-close{position:absolute;top:14px;right:16px;background:none;
  border:none;color:#555;font-size:20px;cursor:pointer;line-height:1}
.login-close:hover{color:#fff}
.login-title{font-family:'Bebas Neue',Impact,sans-serif;font-size:30px;
  letter-spacing:3px;color:#fff;margin-bottom:4px}
.login-sub{font-size:11px;color:#555;margin-bottom:24px}
.login-input{width:100%;padding:13px 14px;background:rgba(255,255,255,.04);
  border:1.5px solid #222;border-radius:10px;color:#F0EBE3;font-size:14px;
  outline:none;transition:.2s;margin-bottom:8px;box-sizing:border-box}
.login-input:focus{border-color:rgba(204,0,0,.5);background:rgba(255,255,255,.06)}
.login-input::placeholder{color:#444}
.login-err{display:none;font-size:12px;color:#ff7777;margin-bottom:12px;
  padding:8px 12px;background:rgba(204,0,0,.08);border-radius:8px}
.login-divider{display:flex;align-items:center;gap:10px;margin:14px 0}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:#222}
.login-divider span{font-size:10px;color:#444;letter-spacing:2px}
.btn-google{width:100%;padding:13px;background:rgba(255,255,255,.05);
  border:1.5px solid #333;border-radius:10px;color:#F0EBE3;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Bebas Neue',Impact,sans-serif;font-size:17px;letter-spacing:2px;
  transition:.2s;margin-bottom:6px}
.btn-google:hover{border-color:rgba(204,0,0,.4);background:rgba(255,255,255,.08)}
.btn-enter{width:100%;padding:14px;background:linear-gradient(135deg,#CC0000,#8B0000);
  color:#fff;border:none;border-radius:10px;
  font-family:'Bebas Neue',Impact,sans-serif;font-size:20px;letter-spacing:3px;
  cursor:pointer;box-shadow:0 6px 24px rgba(204,0,0,.4);transition:.2s}
.btn-enter:hover{transform:translateY(-1px);box-shadow:0 10px 32px rgba(204,0,0,.55)}
.btn-enter:disabled{background:#222;color:#555;box-shadow:none;transform:none;cursor:not-allowed}
.login-footer{text-align:center;margin-top:14px;font-size:11px;color:#444}
.login-footer a{color:#CC0000;cursor:pointer;text-decoration:underline}
</style>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider,
         signInWithEmailAndPassword, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const cfg = {
  apiKey:'AIzaSyAsjpwQwio7Y2SREpnrJf0DSb9fySkhlSY',
  authDomain:'spfc-hoje-da329.firebaseapp.com',
  projectId:'spfc-hoje-da329',
  storageBucket:'spfc-hoje-da329.firebasestorage.app',
  messagingSenderId:'116174859005',
  appId:'1:116174859005:web:b1e54b040aef23c9c16c94'
};
const app  = getApps().find(a=>a.name==='[DEFAULT]') || initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();

window.FB_INDEX = { auth, db, provider, signInWithPopup, signInWithRedirect, getRedirectResult, signInWithEmailAndPassword };

window.addEventListener('DOMContentLoaded', () => {
  // Captura resultado do redirect do Google
  getRedirectResult(auth).catch(() => {});

  onAuthStateChanged(auth, async user => {
    if (!user) return;
    try {
      const snap = await getDoc(doc(db, 'usuarios', user.uid));
      snap.exists() ? goToApp() : goTo('cadastro.html');
    } catch(e) { goToApp(); }
  });
});
</script>

class DustSystem {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.particles = [];
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.animate();
  }
  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
  }
  spawn() {
    return {
      x: Math.random() * this.canvas.width,
      y: Math.random() * this.canvas.height,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.1 - 0.05,
      size: Math.random() * 2 + 0.5,
      opacity: Math.random() * 0.15 + 0.03,
      life: Math.random() * 400 + 200,
      maxLife: Math.random() * 400 + 200,
    };
  }
  animate() {
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    while (this.particles.length < 60) {
      this.particles.push(this.spawn());
    }
    this.particles.forEach((p, i) => {
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      const lifeRatio = p.life / p.maxLife;
      const alpha = p.opacity * lifeRatio;
      this.ctx.beginPath();
      this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      this.ctx.fillStyle = `rgba(220,220,200,${alpha})`;
      this.ctx.fill();
      if (p.life <= 0) {
        this.particles[i] = this.spawn();
      }
    });
    requestAnimationFrame(() => this.animate());
  }
}

new DustSystem(document.getElementById('dust-canvas'));

const tunnelBg = document.getElementById('tunnelBg');
let mouseX = 0, mouseY = 0;
let currentX = 0, currentY = 0;

document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function parallaxLoop() {
  currentX += (mouseX - currentX) * 0.05;
  currentY += (mouseY - currentY) * 0.05;
  tunnelBg.style.transform = `scale(1.0) translate(${-currentX * 8}px, ${-currentY * 5 - 2}%)`;
  requestAnimationFrame(parallaxLoop);
}
parallaxLoop();

// Transição animada e redireciona pro app

function goTo(page) {
  const o = document.getElementById('transitionOverlay');
  const t = document.getElementById('loadingText');
  o.classList.add('active'); t.classList.add('active');
  t.textContent = page === 'cadastro.html' ? 'CRIAR PERFIL...' : 'CARREGANDO...';
  setTimeout(() => { window.location.href = page; }, 900);
}

function goToApp() {
  const o = document.getElementById('transitionOverlay');
  const t = document.getElementById('loadingText');
  o.classList.add('active'); t.classList.add('active');
  t.textContent = 'BEM-VINDO AO MORUMBI';
  setTimeout(() => { window.location.href = 'main.html'; }, 1400);
}

function openLogin()  { document.getElementById('loginModal').classList.add('open'); }
function closeLogin() { document.getElementById('loginModal').classList.remove('open'); }

async function loginGmail() {
  if (!window.FB_INDEX) { setTimeout(loginGmail, 100); return; }
  try {
    await window.FB_INDEX.signInWithRedirect(window.FB_INDEX.auth, window.FB_INDEX.provider);
  } catch(e) {
    showLoginErr('Erro ao entrar com Google.');
  }
}

async function doLoginEmail() {
  if (!window.FB_INDEX) { setTimeout(doLoginEmail, 100); return; }
  const email = document.getElementById('loginEmail').value.trim();
  const senha = document.getElementById('loginSenha').value;
  const btn   = document.getElementById('btnEntrar');
  hideLoginErr();
  if (!email || !senha) { showLoginErr('Preencha e-mail e senha.'); return; }
  btn.textContent = 'ENTRANDO...'; btn.disabled = true;
  try {
    await window.FB_INDEX.signInWithEmailAndPassword(window.FB_INDEX.auth, email, senha);
  } catch(e) {
    const m = {
      'auth/user-not-found':'E-mail não cadastrado.',
      'auth/wrong-password':'Senha incorreta.',
      'auth/invalid-credential':'E-mail ou senha incorretos.',
      'auth/too-many-requests':'Muitas tentativas. Aguarde.',
    };
    showLoginErr(m[e.code] || 'Erro ao entrar.');
    btn.textContent = 'ENTRAR'; btn.disabled = false;
  }
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.style.display = 'block';
}
function hideLoginErr() { document.getElementById('loginErr').style.display = 'none'; }

function entrarVisitante() {
  localStorage.setItem('spfc_visitante','1');
  goTo('main.html');
}
