<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPFC Hoje - Em Manutenção</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiU1BGQyBIb2plIiwic2hvcnRfbmFtZSI6IlNQRkMgSG9qZSIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMWEwYTA5IiwidGhlbWVfY29sb3IiOiIjZWQxMTExIn0=">

    <!-- Theme Color -->
    <meta name="theme-color" content="#ed1111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SPFC Hoje">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        :root {
            --spfc-red: #ed1111;
            --spfc-dark-red: #b80c0c;
            --spfc-black: #1a0a09;
            --spfc-gold: #c9a84c;
            --spfc-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--spfc-black);
            color: var(--spfc-white);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated background particles */
        .bg-particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--spfc-red);
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle 8s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            50% { opacity: 0.3; transform: translateY(-20vh) scale(1); }
            90% { opacity: 0.6; }
        }

        /* Stadium light beams */
        .light-beam {
            position: absolute;
            top: -50%;
            width: 200px;
            height: 200%;
            background: linear-gradient(180deg, 
                rgba(237, 17, 17, 0.05) 0%, 
                transparent 50%, 
                rgba(237, 17, 17, 0.02) 100%);
            transform: rotate(15deg);
            animation: beamSweep 12s infinite ease-in-out;
            pointer-events: none;
        }

        .light-beam:nth-child(2) {
            left: 20%;
            animation-delay: -4s;
            width: 150px;
        }

        .light-beam:nth-child(3) {
            left: 60%;
            animation-delay: -8s;
            width: 180px;
        }

        @keyframes beamSweep {
            0%, 100% { opacity: 0.3; transform: rotate(15deg) translateX(0); }
            50% { opacity: 0.7; transform: rotate(15deg) translateX(30px); }
        }

        /* Vignette overlay */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, 
                transparent 0%, 
                rgba(26, 10, 9, 0.4) 70%, 
                rgba(26, 10, 9, 0.9) 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Main content */
        .main-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }

        /* Logo container */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 3rem;
        }

        .logo-glow {
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, 
                rgba(237, 17, 17, 0.3) 0%, 
                rgba(237, 17, 17, 0.1) 40%, 
                transparent 70%);
            border-radius: 50%;
            animation: glowPulse 3s infinite ease-in-out;
            filter: blur(20px);
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .logo-img {
            width: 220px;
            height: 220px;
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 30px rgba(237, 17, 17, 0.4));
            animation: logoFloat 4s infinite ease-in-out;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Status badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(237, 17, 17, 0.15);
            border: 1px solid rgba(237, 17, 17, 0.3);
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--spfc-red);
            border-radius: 50%;
            animation: dotPulse 2s infinite ease-in-out;
            box-shadow: 0 0 10px var(--spfc-red);
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--spfc-red);
        }

        /* Main title */
        .main-title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, 
                var(--spfc-white) 0%, 
                var(--spfc-gold) 50%, 
                var(--spfc-white) 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* Subtitle */
        .subtitle {
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            max-width: 300px;
            margin: 0 auto 3rem;
            position: relative;
        }

        .progress-track {
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 60%;
            background: linear-gradient(90deg, 
                var(--spfc-red), 
                var(--spfc-gold), 
                var(--spfc-red));
            background-size: 200% 100%;
            border-radius: 3px;
            animation: progressMove 3s infinite ease-in-out, 
                       progressShine 2s infinite linear;
        }

        @keyframes progressMove {
            0%, 100% { width: 30%; }
            50% { width: 70%; }
        }

        @keyframes progressShine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        .progress-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Footer */
        .footer {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.1em;
        }

        .footer strong {
            color: var(--spfc-red);
            font-weight: 600;
        }

        /* Decorative elements */
        .deco-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(237, 17, 17, 0.3), 
                transparent);
            width: 100%;
            max-width: 400px;
            left: 50%;
            transform: translateX(-50%);
        }

        .deco-line.top {
            top: 15%;
        }

        .deco-line.bottom {
            bottom: 15%;
        }

        /* Corner accents */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(237, 17, 17, 0.2);
            z-index: 1;
        }

        .corner.top-left {
            top: 30px;
            left: 30px;
            border-right: none;
            border-bottom: none;
        }

        .corner.top-right {
            top: 30px;
            right: 30px;
            border-left: none;
            border-bottom: none;
        }

        .corner.bottom-left {
            bottom: 30px;
            left: 30px;
            border-right: none;
            border-top: none;
        }

        .corner.bottom-right {
            bottom: 30px;
            right: 30px;
            border-left: none;
            border-top: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .logo-img {
                width: 160px;
                height: 160px;
            }

            .corner {
                width: 25px;
                height: 25px;
            }

            .corner.top-left, .corner.top-right { top: 15px; }
            .corner.bottom-left, .corner.bottom-right { bottom: 15px; }
            .corner.top-left, .corner.bottom-left { left: 15px; }
            .corner.top-right, .corner.bottom-right { right: 15px; }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-particles" id="particles"></div>

    <div class="light-beam"></div>
    <div class="light-beam"></div>
    <div class="light-beam"></div>

    <div class="vignette"></div>

    <!-- Decorative Lines -->
    <div class="deco-line top"></div>
    <div class="deco-line bottom"></div>

    <!-- Corner Accents -->
    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <img src="https://res.cloudinary.com/dkjlv0hcs/image/upload/v1779945135/c5a68f93-009e-465c-94a8-c6a5e8e54e79_xofudf.png" 
                 alt="SPFC Hoje" 
                 class="logo-img">
        </div>

        <div class="status-badge">
            <div class="status-dot"></div>
            <span class="status-text">Em Manutenção</span>
        </div>

        <h1 class="main-title">EM MANUTENÇÃO</h1>
        <p class="subtitle">Logo voltaremos</p>

        <div class="progress-container">
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
            <div class="progress-label">Atualizando o Morumbi Digital</div>
        </div>

        <div class="footer">
            <strong>SPFC</strong> HOJE &mdash; O Tricolor Na Palma Da Sua Mão
        </div>
    </div>

    <script>
        // Generate floating particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 30;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (6 + Math.random() * 4) + 's';
            particle.style.width = (2 + Math.random() * 4) + 'px';
            particle.style.height = particle.style.width;
            particlesContainer.appendChild(particle);
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => {
                    e.waitUntil(self.skipWaiting());
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(self.clients.claim());
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request).catch(() => {
                        return new Response('Offline');
                    }));
                });
            `;

            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);

            navigator.serviceWorker.register(swUrl).catch(() => {});
        }
    </script>
</body>
</html>
